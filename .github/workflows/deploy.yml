name: Deploy MyX Shop to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 检查文件结构
        run: |
          echo "📁 文件结构检查..."
          echo "HTML文件:"
          find . -name "*.html" -type f | grep -v ".git" | sort
          echo ""
          echo "关键目录:"
          ls -la | grep -E "^d"
          
          # 确保.nojekyll文件存在
          touch .nojekyll
          echo "✅ 创建根目录 .nojekyll"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # ⭐ 重要：部署整个仓库（根目录）
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 显示部署信息
        run: |
          echo ""
          echo "🎉 部署完成！"
          echo ""
          echo "🌐 网站可通过以下地址访问："
          echo "   https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo ""
          echo "🔗 主要页面："
          echo "   1. 主站首页: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "   2. 汽车销售: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/index.html"
          echo "   3. Bursa工具: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/tools/bursa/"
          echo "   4. 直接工具: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/web/bursa.html"
          echo ""
          echo "📊 部署统计："
          echo "   HTML文件: $(find . -name '*.html' -type f | grep -v .git | wc -l) 个"
          echo "   图片文件: $(find . -name '*.jpg' -o -name '*.png' -o -name '*.jpeg' -type f | grep -v .git | wc -l) 个"
