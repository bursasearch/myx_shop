<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>紫微斗数免费排盘 | 紫微研习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #eee;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,215,0,0.2);
        }
        h1 { text-align: center; color: #FFD966; margin-bottom: 20px; font-size: 1.8rem; }
        h2, h3 { color: #FFD966; margin-bottom: 15px; }
        .form-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .input-field { flex: 1; min-width: 150px; }
        label { display: block; margin-bottom: 5px; color: #FFD966; font-weight: 500; }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid #FFD966;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 16px;
        }
        .date-input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }
        .date-mode-switch {
            display: flex;
            gap: 12px;
            margin-bottom: 6px;
        }
        .mode-btn {
            flex: 1;
            background: rgba(255,215,0,0.15);
            border: 1px solid #FFD966;
            border-radius: 40px;
            padding: 8px 12px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            color: #eee;
        }
        .mode-btn.active {
            background: #FFD966;
            color: #1a1a2e;
            border-color: #FFD966;
        }
        .manual-date-inputs {
            display: none;
            gap: 12px;
        }
        .manual-date-inputs.active {
            display: flex;
            flex-wrap: wrap;
        }
        .manual-date-inputs input {
            flex: 1;
            min-width: 80px;
        }
        .picker-date-input {
            display: block;
        }
        .picker-date-input.hide {
            display: none;
        }
        .calendar-type {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            justify-content: center;
        }
        .calendar-type label { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
        .btn-container { text-align: center; margin-top: 20px; }
        button {
            background: linear-gradient(135deg, #FFD966, #FFB347);
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            color: #1a1a2e;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.02); }
        .result-area { overflow-x: auto; display: none; }
        .palace-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 20px;
        }
        .palace-card {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 12px;
            border-left: 4px solid #FFD966;
            min-height: 120px;
        }
        .palace-name { font-size: 16px; font-weight: bold; color: #FFD966; margin-bottom: 8px; }
        .palace-dz { float: right; color: #aaa; font-size: 12px; }
        .major-star { color: #ff8888; font-weight: bold; font-size: 14px; margin-bottom: 4px; }
        .minor-star { color: #88ff88; font-size: 12px; }
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        .spinner {
            border: 4px solid rgba(255,215,0,0.3);
            border-top: 4px solid #FFD966;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .info-text { font-size: 12px; color: #aaa; text-align: center; margin-top: 10px; }
        @media (max-width: 768px) { .palace-grid { grid-template-columns: repeat(2, 1fr); } }

        /* 贊助彈窗 */
        .support-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1050;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .support-panel.active { display: flex; }
        .support-card {
            width: 100%;
            max-width: 380px;
            background: white;
            border-radius: 28px;
            padding: 24px;
            position: relative;
            animation: slideUp 0.3s ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            color: #333;
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            width: 30px;
            height: 30px;
            color: #999;
        }
        .qr-switch-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            background: #f0f0f0;
            padding: 6px;
            border-radius: 60px;
        }
        .qr-tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            color: #666;
        }
        .qr-tab.active { background: #2c7a2c; color: white; }
        .qr-container { text-align: center; margin: 15px 0; }
        .qr-code-img {
            width: 100%;
            max-width: 200px;
            height: auto;
            border-radius: 16px;
            margin: 0 auto;
            display: block;
            border: 1px solid #ddd;
            padding: 8px;
            background: white;
        }
        .qr-note {
            background: #e8f5e9;
            padding: 12px;
            border-radius: 16px;
            margin-top: 15px;
            font-size: 13px;
            color: #2e7d32;
            text-align: left;
        }
        .coffee-icon-lg { text-align: center; font-size: 32px; margin-bottom: 10px; color: #FF9800; }
        #coffee-fab {
            position: fixed;
            bottom: 30px;
            right: 25px;
            z-index: 1040;
            background: #FF9800;
            color: white;
            border: none;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>🔮 紫微斗數免費排盤</h1>
        
        <div class="calendar-type">
            <label><input type="radio" name="calendar" value="solar" checked> 公曆 (陽曆)</label>
            <label><input type="radio" name="calendar" value="lunar"> 農曆 (陰曆)</label>
        </div>

        <div class="form-group">
            <div class="input-field" style="flex: 2; min-width: 280px;">
                <label>出生日期</label>
                <div class="date-input-group">
                    <div class="date-mode-switch">
                        <div class="mode-btn active" id="btn-picker">日曆選擇</div>
                        <div class="mode-btn" id="btn-manual">手動輸入</div>
                    </div>
                    <input type="date" id="date-picker" class="picker-date-input" value="1995-01-01">
                    <div class="manual-date-inputs" id="manual-inputs">
                        <input type="number" id="in-year" placeholder="年" min="1900" max="2100" value="1995">
                        <input type="number" id="in-month" placeholder="月" min="1" max="12" value="1">
                        <input type="number" id="in-day" placeholder="日" min="1" max="31" value="1">
                    </div>
                </div>
            </div>

            <div class="input-field">
                <label>出生時辰</label>
                <select id="birth-time">
                    <option value="23">子時 (23:00-01:00)</option>
                    <option value="1">丑時 (01:00-03:00)</option>
                    <option value="3">寅時 (03:00-05:00)</option>
                    <option value="5">卯時 (05:00-07:00)</option>
                    <option value="7">辰時 (07:00-09:00)</option>
                    <option value="9">巳時 (09:00-11:00)</option>
                    <option value="11">午時 (11:00-13:00)</option>
                    <option value="13">未時 (13:00-15:00)</option>
                    <option value="15">申時 (15:00-17:00)</option>
                    <option value="17">酉時 (17:00-19:00)</option>
                    <option value="19">戌時 (19:00-21:00)</option>
                    <option value="21">亥時 (21:00-23:00)</option>
                </select>
            </div>

            <div class="input-field">
                <label>性別</label>
                <select id="gender">
                    <option value="male">乾造 (男)</option>
                    <option value="female">坤造 (女)</option>
                </select>
            </div>
        </div>

        <div class="btn-container">
            <button id="start-btn">開始精準排盤</button>
        </div>
        <p class="info-text">※ 輸入出生日期時辰，系統將為您排出完整命盤</p>
    </div>

    <div class="loading" id="loading-area">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: #FFD966;">正在觀星演數，推算命盤中...</p>
    </div>

    <div class="card result-area" id="result-area">
        <h2>✨ 您的紫微斗數命盤</h2>
        <div class="palace-grid" id="palace-grid"></div>
    </div>
</div>

<!-- 贊助懸浮按鈕 -->
<button id="coffee-fab">☕</button>

<!-- 贊助彈窗面板 - 使用 Maybank 和 TnG -->
<div class="support-panel" id="support-panel">
    <div class="support-card">
        <button class="close-btn" id="close-support">×</button>
        <div class="coffee-icon-lg">☕</div>
        <h3 style="text-align: center; color: #333; margin-bottom: 15px;">请我喝杯咖啡</h3>
        <p style="text-align:center; font-size:13px; color:#666;">如果服务对您有帮助，欢迎随意支持</p>
        <div class="qr-switch-tabs">
            <div class="qr-tab active" id="tab-maybank">🏦 Maybank</div>
            <div class="qr-tab" id="tab-tng">📱 TnG eWallet</div>
        </div>
        <div class="qr-container">
            <img src="images/maybank-qr.jpg" alt="Maybank QR" class="qr-code-img" id="qr-img"
                 onerror="this.src='https://via.placeholder.com/200x200?text=Maybank+QR'">
        </div>
        <div class="qr-note">
            📖 <strong>使用说明</strong><br>
            1. 打开 Maybank App 或 TnG eWallet<br>
            2. 选择 "DuitNow QR" / "扫描付款"<br>
            3. 扫描上方 QR 码<br>
            4. 输入您想支持的金额<br>
            5. 确认转账即可
        </div>
        <p style="font-size:12px; text-align:center; margin-top:10px;">❤️ 感谢每一份支持！</p>
    </div>
</div>

<script>
    // 1. 介面切換邏輯 (日曆選取 vs 手動輸入)
    const btnPicker = document.getElementById('btn-picker');
    const btnManual = document.getElementById('btn-manual');
    const datePicker = document.getElementById('date-picker');
    const manualInputs = document.getElementById('manual-inputs');

    btnPicker.addEventListener('click', () => {
        btnPicker.classList.add('active');
        btnManual.classList.remove('active');
        datePicker.classList.remove('hide');
        manualInputs.classList.remove('active');
    });

    btnManual.addEventListener('click', () => {
        btnManual.classList.add('active');
        btnPicker.classList.remove('active');
        datePicker.classList.add('hide');
        manualInputs.classList.add('active');
    });

    // 2. 贊助彈窗交互 (Maybank + TnG)
    const coffeeFab = document.getElementById('coffee-fab');
    const supportPanel = document.getElementById('support-panel');
    const closeSupport = document.getElementById('close-support');
    const tabMaybank = document.getElementById('tab-maybank');
    const tabTng = document.getElementById('tab-tng');
    const qrImg = document.getElementById('qr-img');

    coffeeFab.addEventListener('click', () => supportPanel.classList.add('active'));
    closeSupport.addEventListener('click', () => supportPanel.classList.remove('active'));
    supportPanel.addEventListener('click', (e) => { if(e.target === supportPanel) supportPanel.classList.remove('active'); });

    tabMaybank.addEventListener('click', () => {
        tabMaybank.classList.add('active');
        tabTng.classList.remove('active');
        qrImg.src = "images/maybank-qr.jpg";
        qrImg.alt = "Maybank QR";
        qrImg.onerror = () => { qrImg.src = "https://via.placeholder.com/200x200?text=Maybank+QR"; };
    });
    tabTng.addEventListener('click', () => {
        tabTng.classList.add('active');
        tabMaybank.classList.remove('active');
        qrImg.src = "images/tng-qr.jpg";
        qrImg.alt = "TnG eWallet QR";
        qrImg.onerror = () => { qrImg.src = "https://via.placeholder.com/200x200?text=TnG+QR"; };
    });

    // 3. 紫微斗數簡易排盤引擎
    const dzNames = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
    const basePalaces = ["命宮", "兄弟宮", "夫妻宮", "子女宮", "財帛宮", "疾厄宮", "遷移宮", "交友宮", "官祿宮", "田宅宮", "福德宮", "父母宮"];
    
    // 主星列表
    const mainStars = ["紫微", "天機", "太陽", "武曲", "天同", "廉貞", "天府", "太陰", "貪狼", "巨門", "天相", "天梁", "七殺", "破軍"];
    const minorStars = ["文昌", "文曲", "左輔", "右弼", "天魁", "天鉞", "祿存", "擎羊", "陀羅", "火星", "鈴星", "地空", "地劫"];
    
    function calculateZiwu(month, hour, day, gender) {
        // 簡化版命宮計算：由寅宮起正月，順數月數，逆數時辰
        let mPalaceIdx = (2 + (month - 1) - Math.floor(hour/2) + 12) % 12;
        
        let grids = [];
        for(let i = 0; i < 12; i++) {
            let pNameIdx = (i - mPalaceIdx + 12) % 12;
            grids.push({
                dz: dzNames[i],
                name: basePalaces[pNameIdx],
                major: "",
                minor: ""
            });
        }

        // 簡化主星分布
        const seed = (day * 7 + month * 3) % 14;
        grids[(mPalaceIdx) % 12].major = mainStars[seed % 14];
        grids[(mPalaceIdx + 3) % 12].major = mainStars[(seed + 3) % 14];
        grids[(mPalaceIdx + 6) % 12].major = mainStars[(seed + 6) % 14];
        grids[(mPalaceIdx + 9) % 12].major = mainStars[(seed + 9) % 14];
        
        // 輔星分布
        const hourIdx = (hour === 23 ? 0 : Math.floor(hour / 2));
        grids[hourIdx % 12].minor = minorStars[hourIdx % 13];
        grids[(12 - hourIdx) % 12].minor += " " + minorStars[(hourIdx + 5) % 13];
        
        return grids;
    }

    // 4. 開始排盤觸發
    document.getElementById('start-btn').addEventListener('click', () => {
        let year, month, day;
        
        if(btnPicker.classList.contains('active')) {
            const dVal = datePicker.value;
            if(!dVal) { alert("請選擇日期！"); return; }
            let parts = dVal.split('-');
            year = parseInt(parts[0]);
            month = parseInt(parts[1]);
            day = parseInt(parts[2]);
        } else {
            year = parseInt(document.getElementById('in-year').value);
            month = parseInt(document.getElementById('in-month').value);
            day = parseInt(document.getElementById('in-day').value);
            if(isNaN(year) || isNaN(month) || isNaN(day)) { alert("請完整輸入年月日！"); return; }
        }

        const hour = parseInt(document.getElementById('birth-time').value);
        const gender = document.getElementById('gender').value;

        // 顯示載入動畫
        document.getElementById('loading-area').style.display = 'block';
        document.getElementById('result-area').style.display = 'none';

        setTimeout(() => {
            document.getElementById('loading-area').style.display = 'none';
            const resultArea = document.getElementById('result-area');
            const palaceGrid = document.getElementById('palace-grid');
            palaceGrid.innerHTML = "";

            // 計算命盤
            let pData = calculateZiwu(month, hour, day, gender);

            pData.forEach(item => {
                let card = document.createElement('div');
                card.className = 'palace-card';
                let majorHtml = item.major ? `<div class="major-star">${item.major}</div>` : '<div class="major-star">✨ 平和</div>';
                let minorHtml = item.minor ? `<div class="minor-star">${item.minor.trim()}</div>` : '';
                card.innerHTML = `
                    <div class="palace-name">${item.name} <span class="palace-dz">${item.dz}</span></div>
                    ${majorHtml}
                    ${minorHtml}
                `;
                palaceGrid.appendChild(card);
            });

            resultArea.style.display = 'block';
            resultArea.scrollIntoView({ behavior: 'smooth' });
        }, 800);
    });
    
    // 設置默認日期為今天
    const today = new Date();
    document.getElementById('date-picker').value = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
</script>
</body>
</html>
