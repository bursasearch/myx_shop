<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紫微斗数免费排盘</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #eee;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,215,0,0.2);
        }
        h1 { text-align: center; color: #FFD966; margin-bottom: 20px; font-size: 1.8rem; }
        h2 { color: #FFD966; margin-bottom: 15px; font-size: 1.3rem; }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-items: flex-end;
        }
        .field { flex: 1; min-width: 140px; }
        label { display: block; margin-bottom: 5px; color: #FFD966; font-weight: 500; font-size: 14px; }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid #FFD966;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 16px;
        }
        button {
            background: linear-gradient(135deg, #FFD966, #FFB347);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            color: #1a1a2e;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.02); }
        .palace-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 20px;
        }
        .palace-card {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 12px;
            border-left: 4px solid #FFD966;
        }
        .palace-name { font-size: 15px; font-weight: bold; color: #FFD966; margin-bottom: 8px; }
        .major-star { color: #ff8888; font-size: 12px; font-weight: bold; }
        .minor-star { color: #88ff88; font-size: 11px; margin-top: 5px; }
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        .spinner {
            border: 4px solid rgba(255,215,0,0.3);
            border-top: 4px solid #FFD966;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg {
            color: #ff8888;
            text-align: center;
            padding: 20px;
            background: rgba(255,0,0,0.1);
            border-radius: 16px;
        }
        .info-text { font-size: 12px; color: #aaa; text-align: center; margin-top: 10px; }
        @media (max-width: 768px) {
            .palace-grid { grid-template-columns: repeat(2, 1fr); }
            .form-row { flex-direction: column; }
            .field { min-width: auto; }
        }
        .coffee-fab {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: #FF9800;
            border: none;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,152,0,0.4);
            color: white;
            z-index: 999;
        }
        .support-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .support-card {
            max-width: 380px;
            background: white;
            border-radius: 28px;
            padding: 20px;
            position: relative;
            color: #333;
        }
        .support-card .close {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
        }
        .qr-tabs {
            display: flex;
            gap: 12px;
            margin: 15px 0;
        }
        .qr-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 30px;
            cursor: pointer;
            background: #f0f0f0;
        }
        .qr-tab.active { background: #2c7a2c; color: white; }
        .qr-img { max-width: 200px; margin: 10px auto; display: block; }
        .qr-note { font-size: 12px; color: #666; margin-top: 15px; text-align: left; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>🌟 紫微斗数免费排盘 🌟</h1>
        <div class="form-row">
            <div class="field">
                <label>📅 出生日期</label>
                <input type="date" id="birthDate">
            </div>
            <div class="field">
                <label>⏰ 时辰</label>
                <select id="birthHour">
                    <option value="0">子时 (23:00-01:00)</option>
                    <option value="1">丑时 (01:00-03:00)</option>
                    <option value="2">寅时 (03:00-05:00)</option>
                    <option value="3">卯时 (05:00-07:00)</option>
                    <option value="4">辰时 (07:00-09:00)</option>
                    <option value="5">巳时 (09:00-11:00)</option>
                    <option value="6">午时 (11:00-13:00)</option>
                    <option value="7">未时 (13:00-15:00)</option>
                    <option value="8">申时 (15:00-17:00)</option>
                    <option value="9">酉时 (17:00-19:00)</option>
                    <option value="10">戌时 (19:00-21:00)</option>
                    <option value="11">亥时 (21:00-23:00)</option>
                </select>
            </div>
            <div class="field">
                <label>⚧ 性别</label>
                <select id="gender">
                    <option value="0">男</option>
                    <option value="1">女</option>
                </select>
            </div>
            <div class="field">
                <button onclick="showDemo()">✨ 查看示例命盘 ✨</button>
            </div>
        </div>
        <div class="info-text">※ 由于网络限制，当前显示示例命盘。完整功能正在开发中。</div>
    </div>

    <div id="result" style="display: none;"></div>
</div>

<!-- Buy Me a Coffee 浮动按钮 -->
<button class="coffee-fab" onclick="showSupport()">☕</button>

<!-- 支持面板 -->
<div id="supportPanel" class="support-panel">
    <div class="support-card">
        <button class="close" onclick="hideSupport()">✕</button>
        <h3 style="text-align:center">☕ 请我喝杯咖啡</h3>
        <p style="text-align:center; font-size:13px;">如果服务对您有帮助，欢迎随意支持</p>
        <div class="qr-tabs">
            <div class="qr-tab active" onclick="switchQR('maybank')">🏦 Maybank</div>
            <div class="qr-tab" onclick="switchQR('tng')">📱 TnG eWallet</div>
        </div>
        <div id="maybankQR">
            <img src="images/maybank-qr.jpg" class="qr-img" onerror="this.src='https://placehold.co/200x200?text=Maybank+QR'">
        </div>
        <div id="tngQR" style="display:none">
            <img src="images/tng-qr.jpg" class="qr-img" onerror="this.src='https://placehold.co/200x200?text=TnG+QR'">
        </div>
        <div class="qr-note">
            📖 <strong>使用说明</strong><br>
            1. 打开 Maybank App 或 TnG eWallet<br>
            2. 选择 "DuitNow QR" / "扫描付款"<br>
            3. 扫描上方 QR 码<br>
            4. 输入您想支持的金额<br>
            5. 确认转账即可
        </div>
        <p style="font-size:12px; text-align:center; margin-top:10px;">❤️ 感谢每一份支持！</p>
    </div>
</div>

<script>
    // 示例命盘数据（展示格式）
    function showDemo() {
        const resultDiv = document.getElementById('result');
        
        const demoData = {
            palaces: [
                { name: "命宫", major: "紫微", minor: "文昌 · 天魁" },
                { name: "兄弟宫", major: "天机", minor: "地空 · 天虚" },
                { name: "夫妻宫", major: "太阳", minor: "文曲 · 红鸾" },
                { name: "子女宫", major: "武曲", minor: "天马 · 禄存" },
                { name: "财帛宫", major: "天同", minor: "擎羊 · 火星" },
                { name: "疾厄宫", major: "廉贞", minor: "陀罗 · 铃星" },
                { name: "迁移宫", major: "天府", minor: "左辅 · 右弼" },
                { name: "交友宫", major: "太阴", minor: "天钺 · 地劫" },
                { name: "官禄宫", major: "贪狼", minor: "天喜 · 咸池" },
                { name: "田宅宫", major: "巨门", minor: "天刑 · 天姚" },
                { name: "福德宫", major: "天相", minor: "天福 · 天寿" },
                { name: "父母宫", major: "七杀", minor: "龙池 · 凤阁" }
            ]
        };
        
        let html = `
            <div class="card">
                <h2>📅 示例命盘（1990年5月10日 午时 男）</h2>
                <p style="color:#aaa; font-size:14px;">八字：庚午 辛巳 乙亥 壬午 | 农历：一九九〇年四月十六</p>
            </div>
            <div class="card">
                <h2>🌟 命盘十二宫</h2>
                <div class="palace-grid">
        `;
        
        demoData.palaces.forEach(p => {
            html += `
                <div class="palace-card">
                    <div class="palace-name">${p.name}</div>
                    <div class="major-star">${p.major}</div>
                    <div class="minor-star">${p.minor}</div>
                </div>
            `;
        });
        
        html += `</div></div>`;
        html += `<div class="card"><p style="text-align:center; color:#aaa;">📌 提示：完整排盘功能需要加载网络库<br>由于网络限制，当前显示示例命盘</p></div>`;
        
        resultDiv.innerHTML = html;
        resultDiv.style.display = 'block';
    }
    
    // 自动显示示例
    setTimeout(() => {
        showDemo();
    }, 100);
    
    function showSupport() {
        document.getElementById('supportPanel').style.display = 'flex';
    }
    function hideSupport() {
        document.getElementById('supportPanel').style.display = 'none';
    }
    function switchQR(type) {
        const maybank = document.getElementById('maybankQR');
        const tng = document.getElementById('tngQR');
        const tabs = document.querySelectorAll('.qr-tab');
        if (type === 'maybank') {
            maybank.style.display = 'block';
            tng.style.display = 'none';
            tabs[0].classList.add('active');
            tabs[1].classList.remove('active');
        } else {
            maybank.style.display = 'none';
            tng.style.display = 'block';
            tabs[0].classList.remove('active');
            tabs[1].classList.add('active');
        }
    }
    
    document.getElementById('supportPanel')?.addEventListener('click', function(e) {
        if (e.target === this) hideSupport();
    });
</script>
</body>
</html>
