<!DOCTYPE html>
<html>
<head>
    <title>API測試</title>
</head>
<body>
    <h1>API連接測試</h1>
    
    <button onclick="testHealth()">測試健康檢查</button>
    <button onclick="getStocks('current')">獲取今日選股</button>
    <button onclick="runAI()">運行AI選股</button>
    
    <div id="result" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc;"></div>

    <script>
        const API_BASE = 'http://localhost:5000';
        
        async function testHealth() {
            try {
                const response = await fetch(API_BASE + '/health');
                const data = await response.json();
                document.getElementById('result').innerHTML = 
                    `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                document.getElementById('result').innerHTML = '錯誤: ' + error.message;
            }
        }
        
        async function getStocks(type) {
            try {
                const response = await fetch(API_BASE + '/get-stocks/' + type);
                const data = await response.json();
                document.getElementById('result').innerHTML = 
                    `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                document.getElementById('result').innerHTML = '錯誤: ' + error.message;
            }
        }
        
        async function runAI() {
            try {
                const response = await fetch(API_BASE + '/run-ai-selection', {
                    method: 'POST'
                });
                const data = await response.json();
                document.getElementById('result').innerHTML = 
                    `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                document.getElementById('result').innerHTML = '錯誤: ' + error.message;
            }
        }
        
        // 頁面加載時自動測試健康檢查
        testHealth();
    </script>
</body>
</html>
