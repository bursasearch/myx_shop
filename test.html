<!-- 在header部分添加 -->
<button onclick="testJSON()" style="margin-top: 10px; padding: 10px; background: #48bb78; color: white; border: none; border-radius: 5px;">
    <i class="fas fa-vial"></i> 測試JSON路徑
</button>

<script>
async function testJSON() {
    const paths = [
        'js/shopee_list.json',
        './js/shopee_list.json',
        '/js/shopee_list.json',
        '../js/shopee_list.json',
        'shopee_list.json'
    ];
    
    for (const path of paths) {
        try {
            const response = await fetch(path);
            console.log(`路徑: ${path} - 狀態: ${response.status}`);
            if (response.ok) {
                const data = await response.json();
                console.log(`✅ 成功！找到 ${data.products?.length || 0} 個產品`);
                alert(`✅ 正確路徑: ${path}\n找到 ${data.products?.length || 0} 個產品`);
                return;
            }
        } catch (error) {
            console.log(`路徑: ${path} - 錯誤: ${error.message}`);
        }
    }
    alert('❌ 未找到JSON文件，請檢查文件名和路徑');
}
</script>
