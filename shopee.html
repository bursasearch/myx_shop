<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myx Shop - Shopee 产品商店</title>
    <meta name="description" content="Myx Shop - 精选Shopee优质产品">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5a6fd8;
            --danger: #f56565;
            --success: #48bb78;
            --warning: #f6ad55;
            --gray-100: #f7fafc;
            --gray-200: #e2e8f0;
            --gray-600: #4a5568;
            --gray-800: #2d3748;
            --radius: 12px;
            --shadow: 0 5px 15px rgba(0,0,0,0.1);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* 筛选器 */
        .filters {
            background: white;
            padding: 1.5rem;
            border-radius: var(--radius);
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .filter-select {
            padding: 0.5rem 1rem;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            background: white;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            padding: 0.5rem 1rem;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        /* 产品网格 */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .product-card {
            background: white;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: var(--gray-100);
            transition: var(--transition);
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .product-info {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .product-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--gray-800);
            line-height: 1.4;
        }

        .product-price {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .product-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--gray-600);
            margin-bottom: 1rem;
        }

        .stock {
            font-weight: 500;
        }

        .stock.in-stock {
            color: var(--success);
        }

        .stock.low-stock {
            color: var(--warning);
        }

        .stock.out-of-stock {
            color: var(--danger);
        }

        .buy-btn {
            display: block;
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: var(--transition);
            margin-top: auto;
            border: none;
            cursor: pointer;
        }

        .buy-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .buy-btn:disabled {
            background: var(--gray-600);
            cursor: not-allowed;
            transform: none;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: white;
            background: rgba(255,255,255,0.1);
            border-radius: var(--radius);
            margin: 2rem 0;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.7;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 2rem;
            color: white;
        }

        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 导航链接 */
        .admin-link {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            text-decoration: none;
            color: var(--primary);
            font-weight: 600;
            box-shadow: var(--shadow);
            z-index: 100;
            transition: var(--transition);
        }

        .admin-link:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        /* 产品统计 */
        .products-stats {
            background: white;
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--gray-600);
        }

        .stat-number {
            font-weight: 700;
            color: var(--primary);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .filters {
                flex-direction: column;
                align-items: stretch;
            }
            
            .filter-group {
                justify-content: space-between;
            }
            
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
            
            .admin-link {
                position: static;
                margin-bottom: 1rem;
                display: inline-block;
            }
            
            .products-stats {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        @media (max-width: 480px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .container {
                padding: 10px;
            }
        }

        /* 分类标签 */
        .category-tag {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            background: var(--gray-100);
            color: var(--gray-600);
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .category-health { background: #e6fffa; color: #234e52; }
        .category-home { background: #fffaf0; color: #744210; }
        .category-electronic { background: #ebf8ff; color: #1a365d; }
        .category-book { background: #faf5ff; color: #44337a; }

        /* 状态标签 */
        .status-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 500;
            margin-left: 0.5rem;
        }

        .status-active { background: #e6fffa; color: #234e52; }
        .status-inactive { background: #fed7d7; color: #c53030; }

        /* 刷新按钮 */
        .refresh-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .refresh-btn:hover {
            background: #38a169;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <!-- 管理后台链接 -->
<a href="shopee_dashboard.html" class="admin-link">
    <i class="fas fa-cog"></i> 管理后台
</a>

    <div class="container">
        <div class="header">
            <h1><i class="fab fa-shopify"></i> Myx Shop</h1>
            <p>精选 Shopee 优质产品 - 一站式购物体验</p>
        </div>

        <!-- 产品统计 -->
        <div class="products-stats">
            <div class="stat-item">
                <i class="fas fa-cubes"></i>
                <span>总产品数: <span class="stat-number" id="totalProducts">0</span></span>
            </div>
            <div class="stat-item">
                <i class="fas fa-check-circle"></i>
                <span>有库存: <span class="stat-number" id="availableProducts">0</span></span>
            </div>
            <div class="stat-item">
                <i class="fas fa-sync-alt"></i>
                <span>最后更新: <span class="stat-number" id="lastUpdated">-</span></span>
            </div>
            <button class="refresh-btn" onclick="ProductStore.loadProducts()">
                <i class="fas fa-redo"></i> 刷新数据
            </button>
        </div>

        <!-- 筛选器 -->
        <div class="filters">
            <div class="filter-group">
                <label for="categoryFilter">分类:</label>
                <select id="categoryFilter" class="filter-select">
                    <option value="all">所有分类</option>
                    <option value="health">保健养生</option>
                    <option value="home">家居生活</option>
                    <option value="electronic">电子产品</option>
                    <option value="book">图书文具</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label for="sortFilter">排序:</label>
                <select id="sortFilter" class="filter-select">
                    <option value="name">按名称</option>
                    <option value="price-low">价格从低到高</option>
                    <option value="price-high">价格从高到低</option>
                    <option value="stock">库存量</option>
                </select>
            </div>
            
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 搜索产品名称...">
        </div>

        <!-- 产品容器 -->
        <div id="productsContainer">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>正在加载产品数据...</p>
            </div>
        </div>
    </div>

    <script>
        // ==================== 图片路径处理函数 ====================
        function getProductImagePath(imagePath) {
            if (!imagePath) {
                return 'https://via.placeholder.com/300x200/cccccc/000000?text=产品图片';
            }
            
            // 如果是完整URL，直接返回
            if (imagePath.startsWith('http://') || imagePath.startsWith('https://') || imagePath.startsWith('//')) {
                return imagePath;
            }
            
            // 使用相对于服务器根目录的路径
            return 'images/products/shopee/' + imagePath;
        }

        // ==================== 分类标签映射 ====================
        const categoryMap = {
            'health': { name: '保健养生', class: 'category-health' },
            'home': { name: '家居生活', class: 'category-home' },
            'electronic': { name: '电子产品', class: 'category-electronic' },
            'book': { name: '图书文具', class: 'category-book' }
        };

        // ==================== 产品管理器 ====================
        const ProductStore = {
            products: [],
            filteredProducts: [],
            lastUpdated: null,
            
            // 从JSON文件加载产品数据
            async loadProducts() {
                try {
                    console.log('开始加载产品数据...');
                    
                    // 使用正确的JSON文件路径
                    const response = await fetch('js/shopee_lists.json');
                    
                    if (!response.ok) {
                        throw new Error(`HTTP错误! 状态: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    console.log('成功加载数据:', data);
                    
                    if (data && data.products && Array.isArray(data.products)) {
                        this.products = data.products;
                        this.filteredProducts = [...this.products];
                        this.lastUpdated = data.lastUpdated || new Date().toISOString();
                        
                        console.log(`✅ 成功加载 ${this.products.length} 个产品`);
                        this.updateStats();
                        this.renderProducts();
                        this.showToast('✅ 数据加载成功', 'success');
                    } else {
                        throw new Error('JSON文件格式不正确');
                    }
                    
                } catch (error) {
                    console.error('❌ 加载产品数据失败:', error);
                    this.showError('加载产品数据失败: ' + error.message);
                }
            },
            
            // 更新统计信息
            updateStats() {
                const totalProducts = this.products.length;
                const availableProducts = this.products.filter(p => p.stock > 0).length;
                
                document.getElementById('totalProducts').textContent = totalProducts;
                document.getElementById('availableProducts').textContent = availableProducts;
                
                if (this.lastUpdated) {
                    const date = new Date(this.lastUpdated);
                    document.getElementById('lastUpdated').textContent = date.toLocaleString('zh-CN');
                }
            },
            
            // 筛选产品
            filterProducts() {
                const category = document.getElementById('categoryFilter').value;
                const searchTerm = document.getElementById('searchInput').value.toLowerCase();
                const sortBy = document.getElementById('sortFilter').value;
                
                let filtered = this.products.filter(product => {
                    // 状态筛选（如果有status字段）
                    if (product.status === 'inactive') {
                        return false;
                    }
                    
                    // 分类筛选
                    if (category !== 'all' && product.category !== category) {
                        return false;
                    }
                    
                    // 搜索筛选
                    if (searchTerm && !product.name.toLowerCase().includes(searchTerm)) {
                        return false;
                    }
                    
                    return true;
                });
                
                // 排序
                filtered.sort((a, b) => {
                    switch (sortBy) {
                        case 'price-low':
                            return a.price - b.price;
                        case 'price-high':
                            return b.price - a.price;
                        case 'stock':
                            return b.stock - a.stock;
                        case 'name':
                        default:
                            return a.name.localeCompare(b.name);
                    }
                });
                
                this.filteredProducts = filtered;
                this.renderProducts();
            },
            
            // 渲染产品
            renderProducts() {
                const container = document.getElementById('productsContainer');
                
                if (this.filteredProducts.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-box-open"></i>
                            <h3>暂无产品</h3>
                            <p>没有找到符合条件的产品，请尝试其他筛选条件</p>
                            <p style="margin-top: 1rem; font-size: 0.9rem;">
                                <i class="fas fa-info-circle"></i> 
                                请确保 JSON 文件存在且格式正确
                            </p>
                        </div>
                    `;
                    return;
                }
                
                let html = '<div class="products-grid">';
                
                this.filteredProducts.forEach(product => {
                    const stockStatus = this.getStockStatus(product.stock);
                    const categoryInfo = categoryMap[product.category] || { name: '其他', class: 'category-tag' };
                    const imagePath = getProductImagePath(product.image);
                    
                    html += `
                        <div class="product-card">
                            <img src="${imagePath}" 
                                 alt="${product.name}" 
                                 class="product-image"
                                 onerror="this.src='https://via.placeholder.com/300x200/cccccc/000000?text=图片加载失败'">
                            <div class="product-info">
                                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                                    <span class="category-tag ${categoryInfo.class}">${categoryInfo.name}</span>
                                    ${product.status ? 
                                        `<span class="status-badge ${product.status === 'active' ? 'status-active' : 'status-inactive'}">
                                            ${product.status === 'active' ? '上架' : '下架'}
                                        </span>` : ''
                                    }
                                </div>
                                <h3 class="product-name">${product.name}</h3>
                                <div class="product-price">RM ${parseFloat(product.price).toFixed(2)}</div>
                                <div class="product-meta">
                                    <span class="stock ${stockStatus.class}">
                                        <i class="fas ${stockStatus.icon}"></i> ${stockStatus.text}
                                    </span>
                                    <span>销量: ${product.sales || 0}</span>
                                </div>
                                ${product.stock > 0 && product.status !== 'inactive' ? 
                                    `<a href="${product.link || '#'}" class="buy-btn" target="_blank" rel="noopener">
                                        <i class="fas fa-shopping-cart"></i> 立即购买
                                    </a>` :
                                    `<button class="buy-btn" disabled>
                                        <i class="fas fa-times-circle"></i> ${product.status === 'inactive' ? '已下架' : '已售罄'}
                                    </button>`
                                }
                            </div>
                        </div>
                    `;
                });
                
                html += '</div>';
                container.innerHTML = html;
            },
            
            // 获取库存状态
            getStockStatus(stock) {
                if (stock <= 0) {
                    return { text: '已售罄', class: 'out-of-stock', icon: 'fa-times-circle' };
                } else if (stock <= 10) {
                    return { text: `仅剩 ${stock} 件`, class: 'low-stock', icon: 'fa-exclamation-triangle' };
                } else {
                    return { text: `有库存`, class: 'in-stock', icon: 'fa-check-circle' };
                }
            },
            
            // 显示错误信息
            showError(message) {
                const container = document.getElementById('productsContainer');
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>加载失败</h3>
                        <p>${message}</p>
                        <div style="margin-top: 1rem; text-align: left; background: rgba(255,255,255,0.1); padding: 1rem; border-radius: 8px;">
                            <p style="margin-bottom: 0.5rem;"><strong>解决方案:</strong></p>
                            <ol style="text-align: left; padding-left: 1.5rem;">
                                <li>检查 JSON 文件路径: <code>js/shopee_lists.json</code></li>
                                <li>确认图片文件夹: <code>images/products/shopee/</code></li>
                                <li>检查文件权限和格式</li>
                                <li>查看浏览器控制台错误信息</li>
                            </ol>
                        </div>
                        <button class="refresh-btn" onclick="ProductStore.loadProducts()" style="margin-top: 1rem;">
                            <i class="fas fa-redo"></i> 重试加载
                        </button>
                    </div>
                `;
            },
            
            // 初始化
            init() {
                this.loadProducts();
                
                // 添加事件监听器
                document.getElementById('categoryFilter').addEventListener('change', () => {
                    this.filterProducts();
                });
                
                document.getElementById('sortFilter').addEventListener('change', () => {
                    this.filterProducts();
                });
                
                document.getElementById('searchInput').addEventListener('input', () => {
                    this.filterProducts();
                });

                // 添加键盘快捷键
                document.addEventListener('keydown', (e) => {
                    if (e.ctrlKey && e.key === 'r') {
                        e.preventDefault();
                        this.loadProducts();
                        this.showToast('🔄 数据已刷新', 'info');
                    }
                });

                console.log('✅ Myx Shop 初始化完成');
            },

            // 显示Toast通知
            showToast(message, type = 'info') {
                // 移除现有的toast
                const existingToast = document.querySelector('.custom-toast');
                if (existingToast) {
                    existingToast.remove();
                }

                const toast = document.createElement('div');
                toast.className = 'custom-toast';
                toast.style.cssText = `
                    position: fixed;
                    top: 20px;
                    left: 50%;
                    transform: translateX(-50%) translateY(-100px);
                    background: white;
                    padding: 1rem 1.5rem;
                    border-radius: 8px;
                    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
                    z-index: 1000;
                    transition: transform 0.3s ease;
                    border-left: 4px solid ${type === 'info' ? 'var(--primary)' : type === 'success' ? 'var(--success)' : 'var(--danger)'};
                    font-weight: 600;
                `;
                toast.innerHTML = `
                    <i class="fas ${type === 'info' ? 'fa-info-circle' : type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i>
                    ${message}
                `;
                
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    toast.style.transform = 'translateX(-50%) translateY(0)';
                }, 100);
                
                setTimeout(() => {
                    toast.style.transform = 'translateX(-50%) translateY(-100px)';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }
        };

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            ProductStore.init();
            
            // 添加页面可见性检测，当页面重新显示时自动刷新数据
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden) {
                    ProductStore.loadProducts();
                }
            });
        });

        // 错误处理
        window.addEventListener('error', function(e) {
            console.error('全局错误:', e.error);
        });
    </script>
</body>
