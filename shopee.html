<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopee精選商品 | Myx Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            line-height: 1.6;
            font-size: 16px; /* 增加基础字体大小 */
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 导航栏样式 */
        .nav-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .nav-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            font-size: 16px; /* 增加导航字体大小 */
        }
        
        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .shopee-btn {
            background: linear-gradient(135deg, #f53d2d, #ff6633);
        }
        
        /* 页面标题 */
        .page-header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }
        
        .page-header h1 {
            font-size: 2.5rem; /* 增加标题字体大小 */
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .page-header p {
            font-size: 1.2rem; /* 增加副标题字体大小 */
            opacity: 0.9;
        }
        
        /* 商店横幅 */
        .store-banner {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .store-banner h2 {
            font-size: 1.8rem; /* 增加横幅标题字体大小 */
            margin-bottom: 8px;
            color: #333;
        }
        
        .store-banner p {
            margin-bottom: 15px;
            font-size: 1.1rem; /* 增加横幅描述字体大小 */
        }
        
        .commission-notice {
            background: #e3f2fd;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 1rem; /* 增加通知字体大小 */
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* 搜索和筛选 */
        .search-filter {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .search-box {
            display: flex;
            margin-bottom: 20px;
        }
        
        .search-box input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px 0 0 8px;
            font-size: 16px; /* 增加搜索框字体大小 */
        }
        
        .search-box button {
            padding: 12px 20px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            font-size: 16px; /* 增加搜索按钮字体大小 */
            transition: background 0.3s;
        }
        
        .search-box button:hover {
            background: #3a7bc8;
        }
        
        .category-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .category-btn {
            padding: 10px 15px;
            background: #f5f5f5;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 15px; /* 增加分类按钮字体大小 */
        }
        
        .category-btn.active {
            background: #4a90e2;
            color: white;
        }
        
        /* 商品网格 */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); /* 调整商品卡片最小宽度 */
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }
        
        .product-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #ff4757;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            z-index: 1;
        }
        
        .product-image {
            height: 200px; /* 固定图片高度，避免过大 */
            overflow: hidden;
        }
        
        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 保持图片比例 */
            transition: transform 0.5s;
        }
        
        .product-card:hover .product-image img {
            transform: scale(1.05);
        }
        
        .product-info {
            padding: 20px;
        }
        
        .product-title {
            font-size: 1.2rem; /* 增加商品标题字体大小 */
            margin-bottom: 10px;
            line-height: 1.4;
            height: 3.2em; /* 固定标题高度，避免布局跳动 */
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        
        .product-price {
            font-size: 1.5rem; /* 增加价格字体大小 */
            font-weight: bold;
            color: #ff4757;
            margin-bottom: 10px;
        }
        
        .product-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .product-rating {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
        }
        
        .product-rating i {
            color: #ffc107;
        }
        
        .commission-rate {
            background: #e3f2fd;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        
        .shopee-link {
            display: block;
            text-align: center;
            padding: 10px;
            background: linear-gradient(135deg, #f53d2d, #ff6633);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s;
            font-size: 1rem; /* 增加购买按钮字体大小 */
        }
        
        .shopee-link:hover {
            background: linear-gradient(135deg, #e03525, #e55a2e);
        }
        
        /* 加载状态 */
        .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            font-size: 1.2rem; /* 增加加载状态字体大小 */
        }
        
        /* 載入更多 */
        .load-more {
            text-align: center;
        }
        
        .load-more-btn {
            padding: 12px 30px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem; /* 增加加载更多按钮字体大小 */
            transition: all 0.3s;
        }
        
        .load-more-btn:hover:not(:disabled) {
            background: #3a7bc8;
        }
        
        .load-more-btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .nav-buttons {
                flex-direction: column;
            }
            
            .page-header h1 {
                font-size: 2rem; /* 移动端标题字体大小 */
            }
            
            .page-header p {
                font-size: 1rem; /* 移动端副标题字体大小 */
            }
            
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 20px;
            }
            
            .category-filters {
                justify-content: center;
            }
            
            .product-title {
                font-size: 1.1rem; /* 移动端商品标题字体大小 */
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }
            
            .products-grid {
                grid-template-columns: 1fr;
            }
            
            .page-header h1 {
                font-size: 1.8rem; /* 小屏幕标题字体大小 */
            }
            
            .store-banner h2 {
                font-size: 1.5rem; /* 小屏幕横幅标题字体大小 */
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 导航栏 -->
        <div class="nav-buttons">
            <a href="index.html" class="nav-btn">
                <i class="fas fa-home"></i> 回到主頁
            </a>
            <a href="stocks.html" class="nav-btn">
                <i class="fas fa-chart-line"></i> AI選股
            </a>
            <a href="products.html" class="nav-btn">
                <i class="fas fa-shopping-bag"></i> 聯盟商店
            </a>
            <a href="shopee.html" class="nav-btn shopee-btn">
                <i class="fas fa-store"></i> Shopee精選
            </a>
            <!-- 管理後台連結 -->
            <a href="data/shopee_lists.html" class="nav-btn" 
               style="background: linear-gradient(135deg, #8e44ad, #9b59b6); color: white;">
                <i class="fas fa-cog"></i> 產品管理
            </a>
        </div>

        <!-- 页面标题 -->
        <div class="page-header">
            <h1><i class="fas fa-store"></i> Shopee 精選商品</h1>
            <p>優質商品推薦 • 透過購買支持本站運營 • 您享受優惠，我獲得少許佣金</p>
        </div>

        <!-- 商店横幅 -->
        <div class="store-banner">
            <h2>🛍️ myx_shop_affiliate's Store</h2>
            <p>精選優質商品，為您把關品質</p>
            <div class="commission-notice">
                <i class="fas fa-info-circle"></i> 
                透過以下連結購買，您不會多付任何費用，我還可以獲得少許佣金支持網站持續運營
            </div>
        </div>

        <!-- 搜索和筛选 -->
        <div class="search-filter">
            <div class="search-box">
                <input type="text" placeholder="搜索商品..." id="searchInput">
                <button onclick="searchProducts()">
                    <i class="fas fa-search"></i> 搜索
                </button>
            </div>
            <div class="category-filters">
                <button class="category-btn active" data-category="all">全部商品</button>
                <button class="category-btn" data-category="health">保健養生</button>
                <button class="category-btn" data-category="home">家居生活</button>
                <button class="category-btn" data-category="electronic">電子產品</button>
                <button class="category-btn" data-category="book">圖書文具</button>
            </div>
        </div>

        <!-- 商品网格 -->
        <div class="products-grid" id="productsGrid">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i> 載入商品中...
            </div>
        </div>

        <!-- 載入更多 -->
        <div class="load-more">
            <button class="load-more-btn" onclick="loadMoreProducts()">
                <i class="fas fa-redo"></i> 載入更多商品
            </button>
        </div>
    </div>

<script>
    // 商品數據
    let shopeeProducts = [];
    let currentCategory = 'all';
    let displayedProducts = 6;
    let originalProducts = [];

    // 從 LocalStorage 讀取數據
    function loadProductsFromLocalStorage() {
        const STORAGE_KEY = 'shopeeProducts_V2';
        const storedProducts = localStorage.getItem(STORAGE_KEY);

        console.log('🔍 调试信息 - 从LocalStorage读取:');
        console.log('键名:', STORAGE_KEY);
        console.log('原始数据:', storedProducts);
        
        if (storedProducts) {
            try {
                shopeeProducts = JSON.parse(storedProducts);
                originalProducts = [...shopeeProducts]; 
                console.log(`✅ 成功加载了 ${shopeeProducts.length} 个商品`, shopeeProducts);
            } catch (e) {
                console.error("❌ 解析 LocalStorage 数据失败:", e);
                shopeeProducts = getDefaultProducts();
                originalProducts = [...shopeeProducts];
            }
        } else {
            console.log('⚠️ LocalStorage 中没有找到产品数据');
            shopeeProducts = getDefaultProducts();
            originalProducts = [...shopeeProducts];
        }
        
        renderProducts();
    }

    function getDefaultProducts() {
        return []; // 空数组，等待后台数据
    }

    // 渲染商品 - 修复版本，匹配后台数据结构
    function renderProducts() {
        const productsGrid = document.getElementById('productsGrid');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        
        console.log('🔄 开始渲染商品，总数:', shopeeProducts.length);
        
        // 筛选商品 - 只显示已上架的商品
        let filteredProducts = originalProducts.filter(product => {
            // 分类筛选
            const categoryMatch = currentCategory === 'all' || product.category === currentCategory;
            
            // 搜索筛选 - 使用后台的 name 字段
            const searchMatch = !searchTerm || 
                product.name.toLowerCase().includes(searchTerm);
            
            // 状态筛选 - 只显示 active 状态且库存 > 0 的商品
            const statusMatch = product.status === 'active' && product.stock > 0;
            
            return categoryMatch && searchMatch && statusMatch;
        });
        
        // 更新商品数组
        shopeeProducts = filteredProducts;
        
        // 显示商品数量
        const productsToShow = shopeeProducts.slice(0, displayedProducts);
        
        // 清空网格
        productsGrid.innerHTML = '';
        
        // 如果没有商品
        if (productsToShow.length === 0) {
            productsGrid.innerHTML = `
                <div class="loading" style="grid-column: 1 / -1;">
                    <i class="fas fa-search"></i> 沒有找到商品，請在管理後台添加商品
                </div>
            `;
            return;
        }
        
        // 渲染商品 - 使用后台的数据结构
        productsToShow.forEach(product => {
            const productCard = document.createElement('div');
            productCard.className = 'product-card';
            
            // 根据后台数据结构调整字段名称
            productCard.innerHTML = `
                ${product.badge ? `<div class="product-badge">${product.badge}</div>` : ''}
                <div class="product-image">
                    <img src="${product.image || 'https://via.placeholder.com/300x200?text=商品圖片'}" 
                         alt="${product.name}" 
                         onerror="this.src='https://via.placeholder.com/300x200?text=圖片加載失敗'">
                </div>
                <div class="product-info">
                    <h3 class="product-title">${product.name}</h3>
                    <div class="product-price">RM${parseFloat(product.price).toFixed(2)}</div>
                    <div class="product-meta">
                        <div class="product-rating">
                            ${generateStarRating(product.rating || 4)}
                            <span>(${product.reviews || product.sales || 0})</span>
                        </div>
                        <div class="commission-rate">${product.commission || 5}%佣金</div>
                    </div>
                    <a href="${product.link || '#'}" class="shopee-link" target="_blank" onclick="trackClick('${product.id}')">
                        <i class="fas fa-external-link-alt"></i> 前往購買
                    </a>
                </div>
            `;
            
            productsGrid.appendChild(productCard);
        });
        
        // 更新"加载更多"按钮状态
        const loadMoreBtn = document.querySelector('.load-more-btn');
        if (displayedProducts >= shopeeProducts.length) {
            loadMoreBtn.disabled = true;
            loadMoreBtn.innerHTML = '<i class="fas fa-check"></i> 已顯示所有商品';
        } else {
            loadMoreBtn.disabled = false;
            loadMoreBtn.innerHTML = '<i class="fas fa-redo"></i> 載入更多商品';
        }
    }

    // 生成星级评分
    function generateStarRating(rating) {
        let stars = '';
        const fullStars = Math.floor(rating);
        const halfStar = rating % 1 >= 0.5;
        
        for (let i = 0; i < fullStars; i++) {
            stars += '<i class="fas fa-star"></i>';
        }
        
        if (halfStar) {
            stars += '<i class="fas fa-star-half-alt"></i>';
        }
        
        const emptyStars = 5 - fullStars - (halfStar ? 1 : 0);
        for (let i = 0; i < emptyStars; i++) {
            stars += '<i class="far fa-star"></i>';
        }
        
        return stars;
    }

    // 設置分類篩選
    function setupCategoryFilters() {
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                currentCategory = this.dataset.category;
                displayedProducts = 6;
                renderProducts();
            });
        });
    }

    // 搜索商品
    function searchProducts() {
        displayedProducts = 6;
        renderProducts();
    }

    // 載入更多商品
    function loadMoreProducts() {
        displayedProducts += 6;
        renderProducts();
    }

    // 點擊追蹤
    function trackClick(productId) {
        console.log(`商品 ${productId} 被點擊`);
    }

    // 按Enter搜索
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            searchProducts();
        }
    });
    
    // 搜索框內容變更時也觸發搜索
    document.getElementById('searchInput').addEventListener('input', function() {
        clearTimeout(window.searchTimeout);
        window.searchTimeout = setTimeout(searchProducts, 300);
    });

    // 初始化頁面
    document.addEventListener('DOMContentLoaded', function() {
        loadProductsFromLocalStorage();
        setupCategoryFilters();
        
        // 添加调试信息
        console.log('✅ 页面初始化完成');
    });

    // 添加監聽 LocalStorage 變化
    window.addEventListener('storage', function(e) {
        if (e.key === 'shopeeProducts_V2') {
            console.log('🔄 检测到商品數據更新，重新加載...');
            loadProductsFromLocalStorage();
        }
    });
</script>
</body>
</html>
