    <style>

            font-size: 0.85rem;
            color: #5a3e2b;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
        }
        .rational-reminder p {

        }
        .quote-text {
            font-weight: 600;
            font-size: 0.95rem;
            color: #b34e2c;
            text-align: center;

        }
        /* Buy Me a Coffee 支持区块 */
        .support-section {
            background: #fff3e0;
            border-radius: 24px;
            padding: 18px 20px;
            margin: 20px 0 10px;

            border: 1px solid #e8cfb0;
        }
        .support-section h4 {
            color: #b34e2c;

        .support-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 12px 0;

        .support-btn {
            background: #d9b48b;

        footer {
            padding: 16px 28px 24px;
            text-align: center;
            font-size: 0.7rem;
            color: #bea98c;
        }
        @media (max-width: 550px) {
            .pillar-gan { font-size: 1.6rem; }
            .pillar-zhi { font-size: 1.4rem; }

        }
        .error-msg {

            background: #fff0ed;
            border-radius: 28px;
            padding: 12px 18px;
            margin-top: 16px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>
            <span>八字演算 · 四柱推命</span>
            <span class="badge">⚖️ 阴阳五行</span>
        </h1>
        <p>输入公历生日及时辰，推算年、月、日、时四柱干支</p>
    </div>
    <div class="form-card">
        <div class="input-row">
            <div class="input-group">
                <label>📅 出生日期</label>
                <input type="date" id="birthDate" value="1990-05-15">
            </div>
            <div class="input-group">
                <label>⏰ 出生时辰 (24h)</label>
                <select id="timeHour">
                    <option value="23">子时 (23:00-01:00)</option>
                    <option value="0">子时 (23-01) 跨日</option>
                    <option value="1">丑时 (01-03)</option>
                    <option value="2">丑时 (01-03)</option>
                    <option value="3">寅时 (03-05)</option>
                    <option value="4">寅时 (03-05)</option>
                    <option value="5">卯时 (05-07)</option>
                    <option value="6">卯时 (05-07)</option>
                    <option value="7">辰时 (07-09)</option>
                    <option value="8">辰时 (07-09)</option>
                    <option value="9">巳时 (09-11)</option>
                    <option value="10">巳时 (09-11)</option>
                    <option value="11">午时 (11-13)</option>
                    <option value="12">午时 (11-13)</option>
                    <option value="13">未时 (13-15)</option>
                    <option value="14">未时 (13-15)</option>
                    <option value="15">申时 (15-17)</option>
                    <option value="16">申时 (15-17)</option>
                    <option value="17">酉时 (17-19)</option>
                    <option value="18">酉时 (17-19)</option>
                    <option value="19">戌时 (19-21)</option>
                    <option value="20">戌时 (19-21)</option>
                    <option value="21">亥时 (21-23)</option>
                    <option value="22">亥时 (21-23)</option>
                </select>
            </div>
            <div class="input-group">
                <label>⚧ 性别 (大运参考)</label>
                <div class="gender-group">
                    <label><input type="radio" name="gender" value="male" checked> 男</label>
                    <label><input type="radio" name="gender" value="female"> 女</label>
                </div>
            </div>
        </div>
        <button class="btn-calc" id="calcBtn">🔮 排盘 · 演算八字</button>
    </div>

    <div id="resultPanel" class="result-area" style="display: none;">
        <div style="text-align: center; font-weight: 500; margin-bottom: 6px;">📜 八字四柱</div>
        <div class="bazi-grid" id="baziGrid"></div>
        <div id="extraInfo" class="detail-info"></div>
        
        <!-- 温韾提醒 -->
        <div class="rational-reminder">
            <p class="quote-text">💡 温韾提醒</p>
            <p>命理分析、AI分析皆为传统文化与科技辅助。<br>
            <strong>「凡事信就好，千万不可迷」</strong><br>
            命运掌握在自己手中，请务必保持理性思考，积极面对人生。</p>
        </div>
        
        <!-- Buy Me a Coffee 支持区块（干净、透明、不踩红线） -->
        <div class="support-section">
            <h4>☕ 如果这个工具对您有帮助</h4>
            <div class="support-buttons">
                <button class="support-btn" onclick="showSupportQR()">📱 支持我们</button>
            </div>
            <div class="support-disclaimer">
                ※ 本工具完全免费，纯文化分享。自愿支持将用于家庭医疗与生活开支。
            </div>
        </div>
        
        <div class="warning-note">
            ※ 八字依据传统干支历法(节气分界)生成，仅供文化参考、个人兴趣研究，不可作为决策唯一依据。
        </div>
    </div>
    <footer>
        基于公历演算 · 年柱以立春为界 | 子时若在23点后日柱自动调整 | 理性参考，把握当下
    </footer>
</div>

<script>
    (function(){
        // 天干地支基础表
        const GAN = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
        const ZHI = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];

        function getMonthGanStart(yearGanIndex) {
            const map = { 0:2,5:2, 1:4,6:4, 2:6,7:6, 3:8,8:8, 4:0,9:0 };
            return map[yearGanIndex];
        }
        function getHourGanStart(dayGanIndex) {
            const map = { 0:0,5:0, 1:2,6:2, 2:4,7:4, 3:6,8:6, 4:8,9:8 };
            return map[dayGanIndex];
        }
        function getLichunDate(year) {
            let c = (year >= 2000 && year <= 2099) ? 4.975 : 4.475;
            let calc = (year * 0.2422 + c) - Math.floor((year - 1) / 4);
            let day = Math.floor(calc);
            return new Date(year, 1, day, 0, 0, 0);
        }
        function getYearPillar(date) {
            let year = date.getFullYear();
            let lichunThis = getLichunDate(year);
            let lichunNext = getLichunDate(year+1);
            let target = new Date(date); target.setHours(0,0,0,0);
            let pillarYear = year;
            if (target < lichunThis) pillarYear = year-1;
            else if (target >= lichunNext) pillarYear = year+1;
            let offset = (pillarYear - 4) % 60;
            if(offset<0) offset+=60;
            return { gan: GAN[offset%10], zhi: ZHI[offset%12], ganIndex: offset%10 };
        }
        function getAccurateZhiIndex(date) {
            const m = date.getMonth()+1, d=date.getDate();
            if ((m==2 && d>=4)||(m==3 && d<6)) return 2;
            if ((m==3 && d>=6)||(m==4 && d<5)) return 3;
            if ((m==4 && d>=5)||(m==5 && d<6)) return 4;
            if ((m==5 && d>=6)||(m==6 && d<6)) return 5;
            if ((m==6 && d>=6)||(m==7 && d<7)) return 6;
            if ((m==7 && d>=7)||(m==8 && d<8)) return 7;
            if ((m==8 && d>=8)||(m==9 && d<8)) return 8;
            if ((m==9 && d>=8)||(m==10 && d<8)) return 9;
            if ((m==10 && d>=8)||(m==11 && d<7)) return 10;
            if ((m==11 && d>=7)||(m==12 && d<7)) return 11;
            if ((m==12 && d>=7)||(m==1 && d<6)) return 0;
            if ((m==1 && d>=6)||(m==2 && d<4)) return 1;
            return (m+1)%12;
        }
        function getMonthPillar(yearGanIndex, date) {
            let zhiIdx = getAccurateZhiIndex(date);
            let startGan = getMonthGanStart(yearGanIndex);
            let offset = (zhiIdx - 2 + 12) % 12;
            let ganIdx = (startGan + offset) % 10;
            return { gan: GAN[ganIdx], zhi: ZHI[zhiIdx], ganIndex: ganIdx };
        }
        function getDayPillar(date) {
            let y = date.getFullYear(), m = date.getMonth()+1, d = date.getDate();
            if(m===1||m===2){ y--; m+=12; }
            let A = Math.floor(y/100), B = Math.floor(A/4), C = 2-A+B;
            let E = Math.floor(365.25*(y+4716)), F = Math.floor(30.6001*(m+1));
            let JD = C+d+E+F-1524.5;
            let offset = Math.floor(JD+0.5)-11;
            offset = ((offset%60)+60)%60;
            return { gan: GAN[offset%10], zhi: ZHI[offset%12], ganIndex: offset%10 };
        }
        function getHourPillar(dayGanIndex, hour24) {
            let zhiIdx = 0;
            if (hour24===23||hour24===0) zhiIdx=0;
            else if (hour24===1||hour24===2) zhiIdx=1;
            else if (hour24===3||hour24===4) zhiIdx=2;
            else if (hour24===5||hour24===6) zhiIdx=3;
            else if (hour24===7||hour24===8) zhiIdx=4;
            else if (hour24===9||hour24===10) zhiIdx=5;
            else if (hour24===11||hour24===12) zhiIdx=6;
            else if (hour24===13||hour24===14) zhiIdx=7;
            else if (hour24===15||hour24===16) zhiIdx=8;
            else if (hour24===17||hour24===18) zhiIdx=9;
            else if (hour24===19||hour24===20) zhiIdx=10;
            else zhiIdx=11;
            let start = getHourGanStart(dayGanIndex);
            let ganIdx = (start + zhiIdx) % 10;
            return { gan: GAN[ganIdx], zhi: ZHI[zhiIdx], ganIndex: ganIdx };
        }
        function computeBazi(birthDateStr, hourVal, gender) {
            let base = new Date(birthDateStr);
            if(isNaN(base)) throw new Error("日期无效");
            let useDate = (hourVal==23) ? new Date(base.getTime()+86400000) : new Date(base);
            let year = getYearPillar(base);
            let day = getDayPillar(useDate);
            let month = getMonthPillar(year.ganIndex, useDate);
            let hour = getHourPillar(day.ganIndex, hourVal);
            return { year, month, day, hour, gender };
        }
        function renderResult(bazi) {
            const grid = document.getElementById('baziGrid');
            grid.innerHTML = `
                <div class="pillar"><div class="pillar-title">年柱</div><div class="pillar-gan">${bazi.year.gan}</div><div class="pillar-zhi">${bazi.year.zhi}</div></div>
                <div class="pillar"><div class="pillar-title">月柱</div><div class="pillar-gan">${bazi.month.gan}</div><div class="pillar-zhi">${bazi.month.zhi}</div></div>
                <div class="pillar"><div class="pillar-title">日柱</div><div class="pillar-gan">${bazi.day.gan}</div><div class="pillar-zhi">${bazi.day.zhi}</div></div>
                <div class="pillar"><div class="pillar-title">时柱</div><div class="pillar-gan">${bazi.hour.gan}</div><div class="pillar-zhi">${bazi.hour.zhi}</div></div>
            `;
            const extra = document.getElementById('extraInfo');
            extra.innerHTML = `<div>📌 日主: <strong class="day-master">${bazi.day.gan}</strong> &nbsp; | 性别: ${bazi.gender==='male'?'男':'女'}</div>
            <div style="margin-top:8px;">⚖️ 阴阳: ${bazi.day.ganIndex%2===0?'阳干':'阴干'} · ${(bazi.day.zhiIndex||0)%2===0?'阳支':'阴支'}</div>
            <div>📖 八字排盘: ${bazi.year.gan}${bazi.year.zhi} ${bazi.month.gan}${bazi.month.zhi} ${bazi.day.gan}${bazi.day.zhi} ${bazi.hour.gan}${bazi.hour.zhi}</div>`;
            document.getElementById('resultPanel').style.display = 'block';
        }
        
        const btn = document.getElementById('calcBtn');
        btn.addEventListener('click',()=>{
            try{
                let date = document.getElementById('birthDate').value;
                let hour = parseInt(document.getElementById('timeHour').value,10);
                let gender = document.querySelector('input[name="gender"]:checked').value;
                let bazi = computeBazi(date, hour, gender);
                renderResult(bazi);
            }catch(e){ alert("排盘出错:"+e.message); }
        });
        setTimeout(()=>btn.click(),100);
    })();
    
    // 支持按钮功能 - 弹出提示（可替换为实际二维码弹窗或跳转）
    function showSupportQR() {
        alert("☕ 感谢您的支持！\n\n请前往「我的故事」页面查看 Maybank 和 TnG 二维码。\n\n点击确定返回首页，然后点击「我的故事」按钮。");
        // 可选：跳转到 mystory.html
        if(confirm("是否现在前往「我的故事」页面？")) {
            window.location.href = "mystory.html";
        }
    }
</script>
</body>
