<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>紫微斗数 - 修正测试</title>
    <script type="importmap">
        {
            "imports": {
                "iztro": "https://esm.sh/iztro"
            }
        }
    </script>
    <script type="module">
        import iztroLib from 'iztro';
        window.iztroLib = iztroLib;
        window.iztroReady = true;
        
        window.testAstrolabe = function() {
            const outputDiv = document.getElementById('output');
            outputDiv.innerHTML = '正在排盘...';
            
            try {
                // 1. 先检查库的对象结构，这能帮助我们定位问题
                console.log('iztroLib 整体结构:', iztroLib);
                console.log('iztroLib.astro 方法:', iztroLib.astro);
                
                // 2. 尝试用不同的参数格式调用 bySolar
                // 参数：年份, 月份, 日期, 小时, 分钟, 性别(字符串)
                console.log('尝试调用 bySolar...');
                const result = iztroLib.astro.bySolar(1990, 5, 10, 11, 0, 'male');
                
                console.log('排盘成功，完整数据:', result);
                
                // 简单显示命盘信息
                if (result && result.palaces) {
                    let palaceInfo = '命盘十二宫:\n';
                    result.palaces.forEach(p => {
                        palaceInfo += `${p.name}宫: 主星[${(p.majorStars || []).map(s => s.name).join(',') || '无'}]\n`;
                    });
                    outputDiv.innerHTML = `<pre>排盘成功！\n\n${palaceInfo}\n完整数据:\n${JSON.stringify(result, null, 2)}</pre>`;
                } else {
                    outputDiv.innerHTML = `<pre>排盘返回了数据，但结构不包含 'palaces' 字段。\n数据内容:\n${JSON.stringify(result, null, 2)}</pre>`;
                }
            } catch (error) {
                console.error('排盘详细错误:', error);
                outputDiv.innerHTML = `<pre style="color: red;">排盘失败！\n错误信息: ${error.message}\n\n请打开浏览器开发者工具(F12)查看控制台的完整错误堆栈。</pre>`;
            }
        };
    </script>
</head>
<body>
    <h1>紫微斗数 - 修正测试</h1>
    <button onclick="testAstrolabe()">测试排盘 (性别参数用字符串)</button>
    <div id="output" style="margin-top: 20px; white-space: pre-wrap; word-break: break-all;"></div>
</body>
</html>
