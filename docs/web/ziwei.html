<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>紫微斗数免费排盘 | 命盘解析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;

    <!-- 使用更稳定的 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/iztro@2.7.0/dist/iztro.umd.js"></script>
    <script>
        // 备用 CDN
        let iztroLoaded = false;
        let loadAttempts = 0;
        
        function checkIztro() {
            if (typeof iztro !== 'undefined') {
                console.log('✅ iztro 加载成功');
                iztroLoaded = true;
                return true;
            }
            if (loadAttempts > 50) {
                console.error('❌ iztro 加载超时');
                document.getElementById('loading').style.display = 'none';
                const resultDiv = document.getElementById('result');
                resultDiv.innerHTML = `
                    <div class="error-msg">
                        ⚠️ 排盘库加载失败<br>
                        <small>请检查网络后刷新页面重试</small>
                        <div><button class="retry-btn" onclick="location.reload()">🔄 刷新重试</button></div>
                    </div>
                `;
                resultDiv.style.display = 'block';
                return false;
            }
            loadAttempts++;
            setTimeout(checkIztro, 100);
            return false;
        }
        
        window.addEventListener('load', function() {
            setTimeout(checkIztro, 500);
        });
    </script>

<script>
    // 真太阳时修正
    const timezoneAdjCheck = document.getElementById('timezoneAdj');
    const longitudeSelect = document.getElementById('longitude');
    const customLongInput = document.getElementById('customLong');
    
    timezoneAdjCheck.addEventListener('change', function() {
        if (this.checked) {
            longitudeSelect.style.display = 'block';
        } else {
            longitudeSelect.style.display = 'none';
            customLongInput.style.display = 'none';
        }
    });
    
    longitudeSelect.addEventListener('change', function() {
        if (this.value === 'custom') {
            customLongInput.style.display = 'block';
        } else {
            customLongInput.style.display = 'none';
        }
    });
    
    function getTrueSolarHour(hour, minute) {
        const adjChecked = document.getElementById('timezoneAdj').checked;
        if (!adjChecked) return hour;
        
        let longitude = 120;
        const lonSelect = document.getElementById('longitude');
        if (lonSelect.value === 'custom') {
            longitude = parseFloat(document.getElementById('customLong').value);
        } else if (lonSelect.value) {
            longitude = parseFloat(lonSelect.value);
        }
        
        if (isNaN(longitude)) longitude = 120;
        
        const timeDiff = (longitude - 120) * 4; // 每度4分钟
        let adjustedHour = hour + Math.floor(timeDiff / 60);
        let adjustedMinute = minute + (timeDiff % 60);
        
        if (adjustedMinute >= 60) {
            adjustedHour++;
            adjustedMinute -= 60;
        }
        if (adjustedMinute < 0) {
            adjustedHour--;
            adjustedMinute += 60;
        }
        
        adjustedHour = Math.max(0, Math.min(23, adjustedHour));
        
        // 时辰边界调整
        if (adjustedHour >= 23 || adjustedHour < 1) return 23;
        if (adjustedHour >= 1 && adjustedHour < 3) return 1;
        if (adjustedHour >= 3 && adjustedHour < 5) return 3;
        if (adjustedHour >= 5 && adjustedHour < 7) return 5;
        if (adjustedHour >= 7 && adjustedHour < 9) return 7;
        if (adjustedHour >= 9 && adjustedHour < 11) return 9;
        if (adjustedHour >= 11 && adjustedHour < 13) return 11;
        if (adjustedHour >= 13 && adjustedHour < 15) return 13;
        if (adjustedHour >= 15 && adjustedHour < 17) return 15;
        if (adjustedHour >= 17 && adjustedHour < 19) return 17;
        if (adjustedHour >= 19 && adjustedHour < 21) return 19;
        if (adjustedHour >= 21 && adjustedHour < 23) return 21;
        
        return hour;
    }

    function getAstrolabe() {
        if (!iztroLoaded && typeof iztro === 'undefined') {
            alert('排盘库加载中，请稍后再试');
            return;
        }
        
        const loadingDiv = document.getElementById('loading');
        const resultDiv = document.getElementById('result');
        
        loadingDiv.style.display = 'block';
        resultDiv.style.display = 'none';
        resultDiv.innerHTML = '';

        try {
            const birthDate = document.getElementById('birthDate').value;
            let hour = parseInt(document.getElementById('birthHour').value);
            const minute = 0;
            const gender = document.getElementById('gender').value;
            const calendarType = document.querySelector('input[name="calendarType"]:checked').value;

            if (!birthDate) {
                throw new Error('请选择出生日期');
            }
            
            hour = getTrueSolarHour(hour, minute);

            let [year, month, day] = birthDate.split('-').map(Number);
            
            let astrolabeData;
            const iztroLib = iztro;
            
            if (calendarType === 'solar') {
                astrolabeData = iztroLib.astrolabe({
                    solarDate: [year, month, day],
                    hour: hour,
                    gender: gender === 'male' ? 1 : 0,
                    language: 'zh'
                });
            } else {
                // 正确处理农历（包含闰月判断）
                astrolabeData = iztroLib.astrolabe({
                    lunarDate: [year, month, day, false], // [年,月,日,是否闰月]
                    hour: hour,
                    gender: gender === 'male' ? 1 : 0,
                    language: 'zh'
                });
            }
            
            if (!astrolabeData || !astrolabeData.houses) {
                throw new Error('排盘失败，请检查日期是否正确');
            }
            
            displayAstrolabe(astrolabeData, calendarType, {year, month, day});
            
        } catch (error) {
            resultDiv.innerHTML = `<div class="error-msg">❌ ${error.message || '排盘出错，请检查输入（年份建议1900-2025）'}</div>`;
            resultDiv.style.display = 'block';
        } finally {
            loadingDiv.style.display = 'none';
        }
    }

    function displayAstrolabe(data, calendarType, dateInfo) {
        const resultDiv = document.getElementById('result');
        
        const palaceNames = ['命宫', '兄弟宫', '夫妻宫', '子女宫', '财帛宫', '疾厄宫', '迁移宫', '交友宫', '官禄宫', '田宅宫', '福德宫', '父母宫'];
        
        let html = `
            <div class="card">
                <h2>📅 ${calendarType === 'solar' ? '阳历' : '农历'}：${dateInfo.year}-${dateInfo.month}-${dateInfo.day}</h2>
                <h2>🌟 命盘十二宫 🌟</h2>
                <div class="palace-grid">
        `;
        
        const houses = data.houses;
        for (let i = 0; i < Math.min(houses.length, 12); i++) {
            const palace = houses[i];
            const majorStars = palace.majorStars || [];
            const minorStars = palace.minorStars || [];
            const ganzhi = palace.ganZhi || palace.ganzhi || '';
            const location = palace.location || '';
            
            html += `
                <div class="palace-card">
                    <div class="palace-name">
                        ${palaceNames[i]}
                        ${ganzhi ? `<span class="ganzhi">${ganzhi}</span>` : ''}
                    </div>
                    <div class="major-star">${majorStars.length > 0 ? majorStars.join(' · ') : '无主星'}</div>
                    <div class="minor-star">${minorStars.slice(0, 6).join(' ')}</div>
                </div>
            `;
        }
        
        html += `</div></div>`;
        
        // 四化飞星
        if (data.transformations && data.transformations.length > 0) {
            html += `<div class="card"><h3>🌀 四化飞星 🌀</h3><div style="display: flex; flex-wrap: wrap; gap: 10px;">`;
            data.transformations.forEach(t => {
                html += `<span class="badge">${t.star} → ${t.type}</span>`;
            });
            html += `</div></div>`;
        }
        
        // 命主身主
        if (data.lifeLord || data.bodyLord) {
            html += `<div class="card"><h3>📿 命主身主</h3>`;
            if (data.lifeLord) html += `<span class="badge">命主：${data.lifeLord}</span>`;
            if (data.bodyLord) html += `<span class="badge">身主：${data.bodyLord}</span>`;
            html += `</div>`;
        }
        
        // 五行局
        if (data.fiveElement) {
            html += `<div class="card"><h3>⚡ 五行局</h3><span class="badge">${data.fiveElement}</span></div>`;
        }
        
        // 大运表格
        if (data.decades && data.decades.length > 0) {
            html += `<div class="card"><h3>📊 大运走势</h3>`;
            html += `<table class="decade-table"><thead><tr><th>年龄</th><th>大运宫位</th><th>大运干支</th><th>主星</th></tr></thead><tbody>`;
            data.decades.forEach(decade => {
                const startAge = decade.startAge || '';
                const endAge = decade.endAge || '';
                const ageRange = startAge && endAge ? `${startAge}-${endAge}` : startAge || '';
                const palaceName = decade.palaceName || decade.palace || '';
                const ganzhi = decade.ganZhi || '';
                const majorStars = decade.majorStars ? decade.majorStars.slice(0, 2).join(', ') : '';
                html += `<tr>
                    <td>${ageRange}岁</td>
                    <td>${palaceName}</td>
                    <td>${ganzhi}</td>
                    <td>${majorStars || '—'}</td>
                </tr>`;
            });
            html += `</tbody></table></div>`;
        }
        
        resultDiv.innerHTML = html;
        resultDiv.style.display = 'block';
    }

    function showSupportPanel() {
        document.getElementById('supportPanel').style.display = 'flex';
    }
    
    function hideSupportPanel() {
        document.getElementById('supportPanel').style.display = 'none';
    }
    
    document.getElementById('supportPanel')?.addEventListener('click', function(e) {
        if (e.target === this) hideSupportPanel();
    });

    function switchPayMethod(type) {
        const maybankDiv = document.getElementById('maybankPay');
        const tngDiv = document.getElementById('tngPay');
        const tabs = document.querySelectorAll('.qr-tab');
        
        if (type === 'maybank') {
            maybankDiv.style.display = 'block';
            tngDiv.style.display = 'none';
            tabs[0].classList.add('active');
            tabs[1].classList.remove('active');
        } else {
            maybankDiv.style.display = 'none';
            tngDiv.style.display = 'block';
            tabs[0].classList.remove('active');
            tabs[1].classList.add('active');
        }
    }
    
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            alert('已复制: ' + text);
        }).catch(() => {
            prompt('请手动复制:', text);
        });
    }
    
    // 初始化检查
    setTimeout(() => {
        if (typeof iztro !== 'undefined') iztroLoaded = true;
    }, 1000);
</script>
</body>
</html>
