<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紫微斗數精微排盤 | 修正版農曆</title>

<style>
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:'Segoe UI',sans-serif; background:#0f172a; color:#fff; padding:20px; }
.container{ max-width:1200px; margin:auto; }
.card{ background:#111c33; padding:20px; border-radius:24px; margin-bottom:20px; border:1px solid rgba(255,215,0,.3); }
h1{ text-align:center; color:#FFD966; margin-bottom:20px; }
.form-group{ display:flex; flex-wrap:wrap; gap:15px; }
.input-field{ flex:1; min-width:200px; }
label{ display:block; margin-bottom:8px; color:#FFD966; }
input, select{ width:100%; padding:12px; border-radius:18px; border:none; background:#1e293b; color:#fff; }
button{ background:#FFD966; color:#000; border:none; padding:14px 30px; border-radius:40px; font-weight:bold; cursor:pointer; }
.btn-wrap{ text-align:center; margin-top:20px; }
.info-panel{ margin-top:15px; background:#1b2b4a; padding:14px; border-radius:18px; color:#FFE7A3; }
.calendar-type{ display:flex; justify-content:center; gap:20px; margin-bottom:20px; }
.date-mode-switch{ display:flex; gap:10px; margin-bottom:10px; }
.mode-btn{ flex:1; padding:10px; text-align:center; border-radius:30px; border:1px solid #FFD966; cursor:pointer; }
.mode-btn.active{ background:#FFD966; color:#000; }
.manual-date-inputs{ display:none; gap:10px; }
.manual-date-inputs.active{ display:flex; }
.hide{ display:none; }
.palace-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:15px; margin-top:20px; }
.palace-card{ background:#17233d; border-left:4px solid #FFD966; padding:15px; border-radius:18px; }
.palace-name{ font-weight:bold; color:#FFD966; margin-bottom:10px; }
.major-star{ color:#FFB3A1; margin-bottom:8px; }
.minor-star{ color:#9fd0ff; }
@media(max-width:768px){ .palace-grid{ grid-template-columns:repeat(2,1fr); } }
</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>🌟 紫微斗數 · 修正版農曆 🌟</h1>

<div class="calendar-type">
<label><input type="radio" name="calendar" value="solar" checked> 公曆</label>
<label><input type="radio" name="calendar" value="lunar"> 農曆</label>
</div>

<div class="form-group">

<div class="input-field" style="flex:2">

<label>出生日期</label>

<div class="date-mode-switch">
<div class="mode-btn active" id="btn-picker">日期選取</div>
<div class="mode-btn" id="btn-manual">手動輸入</div>
</div>

<input type="date" id="date-picker" value="2026-05-17">

<div class="manual-date-inputs" id="manual-inputs">
<input type="number" id="in-year" placeholder="年" value="2026">
<input type="number" id="in-month" placeholder="月" value="4">
<input type="number" id="in-day" placeholder="日" value="1">
</div>

<div style="margin-top:10px;">
<label><input type="checkbox" id="isLeapMonth"> 閏月</label>
</div>

<div class="info-panel" id="date-live-info">
等待輸入日期...
</div>

</div>

<div class="input-field">

<label>時辰</label>

<select id="birth-time">
<option value="0">子時 (23-01)</option>
<option value="1">丑時 (01-03)</option>
<option value="2">寅時 (03-05)</option>
<option value="3">卯時 (05-07)</option>
<option value="4">辰時 (07-09)</option>
<option value="5">巳時 (09-11)</option>
<option value="6">午時 (11-13)</option>
<option value="7">未時 (13-15)</option>
<option value="8">申時 (15-17)</option>
<option value="9">酉時 (17-19)</option>
<option value="10">戌時 (19-21)</option>
<option value="11">亥時 (21-23)</option>
</select>

</div>

</div>

<div class="btn-wrap">
<button id="start-btn">🔮 起盤</button>
</div>

</div>

<div class="card" id="result-area" style="display:none;">
<h2 id="result-title"></h2>
<div class="palace-grid" id="palace-grid"></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.6.9/lunar.min.js"></script>

<script>

const EARTH_BRANCHES = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
const TWELVE_PALACES = ["命宮","兄弟宮","夫妻宮","子女宮","財帛宮","疾厄宮","遷移宮","交友宮","官祿宮","田宅宮","福德宮","父母宮"];
const MAJOR_STARS = ["紫微","天機","太陽","武曲","天同","廉貞","天府","太陰","貪狼","巨門","天相","天梁","七殺","破軍"];

// 准确的农历转换
function getAccurateLunar(year, month, day) {
    try {
        const solar = Lunar.Solar.fromYmd(year, month, day);
        const lunar = solar.getLunar();
        
        // 获取农历月份（正数表示月份，负数表示闰月）
        let lunarMonth = lunar.getMonth();
        let isLeap = lunar.isLeap();
        let displayMonth = Math.abs(lunarMonth);
        
        return {
            year: lunar.getYear(),
            month: displayMonth,
            monthRaw: lunarMonth,
            day: lunar.getDay(),
            monthName: lunar.getMonthInChinese(),
            dayName: lunar.getDayInChinese(),
            isLeap: isLeap,
            ganZhiYear: lunar.getYearInGanZhi(),
            ganZhiMonth: lunar.getMonthInGanZhi(),
            ganZhiDay: lunar.getDayInGanZhi(),
            solarTerm: lunar.getSolarTerm()
        };
    } catch(e) {
        console.error(e);
        return null;
    }
}

function formatLunarDate(lunar) {
    if(!lunar) return "錯誤";
    const leap = lunar.isLeap ? "閏" : "";
    return `${lunar.year}年 ${leap}${lunar.monthName}月 ${lunar.dayName}`;
}

function refreshLiveInfo() {
    let y, m, d;
    const isPicker = pickerBtn.classList.contains("active");
    
    if(isPicker) {
        if(!datePicker.value) return;
        const parts = datePicker.value.split("-");
        y = parseInt(parts[0]);
        m = parseInt(parts[1]);
        d = parseInt(parts[2]);
    } else {
        y = parseInt(inYear.value);
        m = parseInt(inMonth.value);
        d = parseInt(inDay.value);
    }
    
    if(radioSolar.checked) {
        const lunar = getAccurateLunar(y, m, d);
        if(lunar) {
            liveInfo.innerHTML = `📅 公曆：${y}年${m}月${d}日<br>🌙 農曆：${formatLunarDate(lunar)}<br>📜 干支：${lunar.ganZhiYear}年 ${lunar.ganZhiMonth}月 ${lunar.ganZhiDay}日`;
        } else {
            liveInfo.innerHTML = "農曆轉換失敗";
        }
    } else {
        const leap = leapMonth.checked ? "閏" : "";
        liveInfo.innerHTML = `🌙 農曆輸入：${y}年${leap}${m}月${d}日`;
    }
}

function generatePalaceData(lunarMonth, lunarDay, timeBranchIdx) {
    let palaceArr = [];
    let mingPos = (lunarMonth + lunarDay + timeBranchIdx) % 12;
    
    for(let i = 0; i < 12; i++) {
        palaceArr.push({
            dz: EARTH_BRANCHES[i],
            name: TWELVE_PALACES[(i - mingPos + 12) % 12],
            major: MAJOR_STARS[(i + lunarDay) % 14],
            minorFinal: i % 2 === 0 ? "文昌" : "文曲"
        });
    }
    return palaceArr;
}

// DOM 元素
const pickerBtn = document.getElementById("btn-picker");
const manualBtn = document.getElementById("btn-manual");
const datePicker = document.getElementById("date-picker");
const manualInputs = document.getElementById("manual-inputs");
const liveInfo = document.getElementById("date-live-info");
const inYear = document.getElementById("in-year");
const inMonth = document.getElementById("in-month");
const inDay = document.getElementById("in-day");
const leapMonth = document.getElementById("isLeapMonth");
const radioSolar = document.querySelector('input[value="solar"]');
const radioLunar = document.querySelector('input[value="lunar"]');

// 切换模式
pickerBtn.onclick = () => {
    pickerBtn.classList.add("active");
    manualBtn.classList.remove("active");
    datePicker.classList.remove("hide");
    manualInputs.classList.remove("active");
    refreshLiveInfo();
};

manualBtn.onclick = () => {
    manualBtn.classList.add("active");
    pickerBtn.classList.remove("active");
    datePicker.classList.add("hide");
    manualInputs.classList.add("active");
    refreshLiveInfo();
};

// 监听输入变化
[datePicker, inYear, inMonth, inDay, leapMonth, radioSolar, radioLunar].forEach(el => {
    el.addEventListener("input", refreshLiveInfo);
    el.addEventListener("change", refreshLiveInfo);
});

refreshLiveInfo();

// 排盘
document.getElementById("start-btn").addEventListener("click", () => {
    let year, month, day;
    const isPicker = pickerBtn.classList.contains("active");
    
    if(isPicker) {
        const parts = datePicker.value.split("-");
        year = parseInt(parts[0]);
        month = parseInt(parts[1]);
        day = parseInt(parts[2]);
    } else {
        year = parseInt(inYear.value);
        month = parseInt(inMonth.value);
        day = parseInt(inDay.value);
    }
    
    let lunarMonth, lunarDay;
    let infoText = "";
    
    if(radioSolar.checked) {
        const lunar = getAccurateLunar(year, month, day);
        if(!lunar) {
            alert("農曆轉換失敗");
            return;
        }
        lunarMonth = lunar.month;
        lunarDay = lunar.day;
        infoText = `📅 公曆 ${year}-${month}-${day}<br>🌙 農曆 ${formatLunarDate(lunar)}`;
    } else {
        const isLeap = leapMonth.checked;
        // 农历转公历用于验证
        try {
            lunarMonth = month;
            lunarDay = day;
            infoText = `🌙 農曆輸入：${year}年${isLeap ? "閏" : ""}${month}月${day}日`;
        } catch(e) {
            alert("農曆日期不正確");
            return;
        }
    }
    
    const timeIdx = parseInt(document.getElementById("birth-time").value);
    const palaceArr = generatePalaceData(lunarMonth, lunarDay, timeIdx);
    
    const grid = document.getElementById("palace-grid");
    grid.innerHTML = "";
    
    palaceArr.forEach(p => {
        const div = document.createElement("div");
        div.className = "palace-card";
        div.innerHTML = `
            <div class="palace-name">${p.name} (${p.dz})</div>
            <div class="major-star">★ ${p.major}</div>
            <div class="minor-star">✨ ${p.minorFinal}</div>
        `;
        grid.appendChild(div);
    });
    
    document.getElementById("result-title").innerHTML = infoText;
    document.getElementById("result-area").style.display = "block";
    
    // 滚动到结果
    document.getElementById("result-area").scrollIntoView({ behavior: "smooth" });
});

</script>

</body>
</html>
