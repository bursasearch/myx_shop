<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>紫微斗数精微排盘 | 正宗晨曆</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at 10% 20%, #0f172a, #030614);
            min-height: 100vh;
            padding: 20px;
            color: #e9f1ff;
        }
        .container { max-width: 1300px; margin: 0 auto; }
        .card {
            background: rgba(15, 25, 45, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 1.5rem 1.8rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 215, 0, 0.35);
        }
        h1 { text-align: center; background: linear-gradient(135deg, #FFE6A3, #FFB347); background-clip: text; -webkit-background-clip: text; color: transparent; margin-bottom: 1rem; font-size: 1.9rem; }
        h2, h3 { color: #FFDE9C; margin-bottom: 0.75rem; }
        .form-group { display: flex; flex-wrap: wrap; gap: 1.2rem; margin-bottom: 1.5rem; justify-content: center; }
        .input-field { flex: 1; min-width: 180px; }
        label { display: block; margin-bottom: 6px; color: #FFD98C; font-size: 0.85rem; }
        input, select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 2rem;
            border: 1px solid rgba(255, 200, 80, 0.5);
            background: rgba(0, 0, 0, 0.6);
            color: #f0f3fa;
            font-size: 1rem;
        }
        .date-mode-switch { display: flex; gap: 12px; margin-bottom: 12px; }
        .mode-btn {
            flex: 1;
            background: rgba(255, 200, 70, 0.1);
            border: 1px solid #f0b849;
            border-radius: 40px;
            padding: 8px 12px;
            text-align: center;
            cursor: pointer;
            font-size: 0.85rem;
            color: #ffe2b5;
        }
        .mode-btn.active { background: #FFD966; color: #121826; border-color: #FFD966; }
        .manual-date-inputs { display: none; gap: 12px; flex-wrap: wrap; }
        .manual-date-inputs.active { display: flex; }
        .picker-date-input.hide { display: none; }
        .info-panel {
            background: rgba(255, 215, 0, 0.12);
            border: 1px dashed #FFD966;
            border-radius: 1.5rem;
            padding: 12px 16px;
            margin-top: 12px;
            text-align: center;
            color: #FADB85;
            font-size: 0.9rem;
        }
        .calendar-type { display: flex; gap: 28px; margin-bottom: 18px; justify-content: center; }
        .calendar-type label { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; }
        .btn-container { text-align: center; margin-top: 20px; }
        button {
            background: linear-gradient(115deg, #FFD966, #FFAA33);
            border: none;
            padding: 12px 32px;
            border-radius: 48px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #141c2c;
            cursor: pointer;
        }
        .palace-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 18px; }
        .palace-card {
            background: rgba(10, 18, 30, 0.7);
            border-radius: 1.5rem;
            padding: 1rem;
            border-left: 5px solid #FFD966;
        }
        .palace-name { font-size: 1.1rem; font-weight: bold; color: #FFE2A4; display: flex; justify-content: space-between; margin-bottom: 10px; }
        .palace-dz { color: #b9c7ff; font-size: 0.75rem; background: rgba(255, 215, 0, 0.2); padding: 2px 8px; border-radius: 40px; }
        .major-star { color: #FFAD93; font-weight: bold; font-size: 0.9rem; margin: 8px 0 5px; }
        .minor-star { color: #9ecfff; font-size: 0.75rem; }
        .loading { text-align: center; padding: 48px 20px; display: none; }
        .spinner { border: 4px solid rgba(255, 215, 0, 0.2); border-top: 4px solid #FFD966; border-radius: 50%; width: 54px; height: 54px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 780px) { .palace-grid { grid-template-columns: repeat(2, 1fr); } }
        
        .support-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 1050;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .support-card {
            max-width: 380px;
            background: white;
            border-radius: 32px;
            padding: 24px;
            position: relative;
            color: #1e293b;
            text-align: center;
        }
        .close-btn {
            position: absolute;
            top: 16px;
            right: 18px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
        .qr-switch-tabs { display: flex; gap: 12px; margin: 20px 0; background: #f1f5f9; padding: 6px; border-radius: 60px; }
        .qr-tab { flex: 1; text-align: center; padding: 10px; border-radius: 50px; cursor: pointer; }
        .qr-tab.active { background: #2c7a2c; color: white; }
        .qr-code-img { max-width: 200px; margin: 10px auto; display: block; border-radius: 16px; }
        .qr-note { background: #eef2ff; padding: 12px; border-radius: 20px; margin-top: 18px; font-size: 0.75rem; text-align: left; }
        #coffee-fab {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: linear-gradient(145deg, #FF9800, #F57C00);
            color: white;
            border: none;
            border-radius: 50%;
            width: 58px;
            height: 58px;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(245, 124, 0, 0.5);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>🌟 紫微斗數 · 正宗晨曆 🌟</h1>

        <div class="calendar-type">
            <label><input type="radio" name="calendar" value="solar" checked> 📅 公曆 (陽曆)</label>
            <label><input type="radio" name="calendar" value="lunar"> 🌙 農曆 (陰曆)</label>
        </div>

        <div class="form-group">
            <div class="input-field" style="flex: 2.2;">
                <label>📅 出生日期</label>
                <div class="date-mode-switch">
                    <div class="mode-btn active" id="btn-picker">📆 日期選取</div>
                    <div class="mode-btn" id="btn-manual">✍️ 手動輸入</div>
                </div>
                <input type="date" id="date-picker" class="picker-date-input" value="2026-05-17">
                <div class="manual-date-inputs" id="manual-inputs">
                    <input type="number" id="in-year" placeholder="年" value="2026">
                    <input type="number" id="in-month" placeholder="月" value="5">
                    <input type="number" id="in-day" placeholder="日" value="17">
                </div>
                <div class="info-panel" id="date-live-info">
                    🌿 日月交輝 · 待君輸入吉時
                </div>
            </div>

            <div class="input-field">
                <label>⏳ 時辰</label>
                <select id="birth-time">
                    <option value="0">子時 (23:00-01:00)</option>
                    <option value="1">丑時 (01:00-03:00)</option>
                    <option value="2">寅時 (03:00-05:00)</option>
                    <option value="3">卯時 (05:00-07:00)</option>
                    <option value="4">辰時 (07:00-09:00)</option>
                    <option value="5">巳時 (09:00-11:00)</option>
                    <option value="6">午時 (11:00-13:00)</option>
                    <option value="7">未時 (13:00-15:00)</option>
                    <option value="8">申時 (15:00-17:00)</option>
                    <option value="9">酉時 (17:00-19:00)</option>
                    <option value="10">戌時 (19:00-21:00)</option>
                    <option value="11">亥時 (21:00-23:00)</option>
                </select>
            </div>

            <div class="input-field">
                <label>⚥ 性別</label>
                <select id="gender">
                    <option value="male">乾造 (男)</option>
                    <option value="female">坤造 (女)</option>
                </select>
            </div>
        </div>

        <div class="btn-container">
            <button id="start-btn">🔮 起盤演曜 · 洞悉天機</button>
        </div>
    </div>

    <div class="loading" id="loading-area">
        <div class="spinner"></div>
        <p style="color: #FFE1A0;">⚙️ 星曜垂象，推演命盤十二宮...</p>
    </div>

    <div class="card result-area" id="result-area" style="display: none;">
        <h2 id="result-title">🏮 紫府微垣 · 本命盤🏮</h2>
        <div class="palace-grid" id="palace-grid"></div>
    </div>
</div>

<!-- 赞助面板 -->
<div id="supportPanel" class="support-panel">
    <div class="support-card">
        <button class="close-btn" id="closeSupportBtn">✕</button>
        <div class="coffee-icon-lg">☕</div>
        <h4>请我喝杯咖啡</h4>
        <div class="qr-switch-tabs">
            <div class="qr-tab active" data-qr="maybank">🏦 Maybank</div>
            <div class="qr-tab" data-qr="tng">📱 TnG eWallet</div>
        </div>
        <div id="maybankQR" class="qr-container">
            <img src="images/maybank-qr.jpg" class="qr-code-img" onerror="this.src='https://via.placeholder.com/200x200?text=Maybank+QR'">
        </div>
        <div id="tngQR" class="qr-container" style="display:none;">
            <img src="images/tng-qr.jpg" class="qr-code-img" onerror="this.src='https://via.placeholder.com/200x200?text=TnG+QR'">
        </div>
        <div class="qr-note">
            📖 1. 打开 Maybank App 或 TnG eWallet<br>
            2. 选择 "DuitNow QR" / "扫描付款"<br>
            3. 扫描上方 QR 码<br>
            4. 输入金额并确认
        </div>
    </div>
</div>

<button id="coffee-fab">☕</button>

<!-- 准确的农历库 -->
<script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.6.9/lunar.min.js"></script>

<script>
    // 十二宫定义
    const EARTH_BRANCHES = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
    const TWELVE_PALACES = ["命宮", "兄弟宮", "夫妻宮", "子女宮", "財帛宮", "疾厄宮", "遷移宮", "交友宮", "官祿宮", "田宅宮", "福德宮", "父母宮"];
    const MAJOR_STARS = ["紫微", "天機", "太陽", "武曲", "天同", "廉貞", "天府", "太陰", "貪狼", "巨門", "天相", "天梁", "七殺", "破軍"];

    // 等待农历库加载
    let LunarJS = null;
    function waitForLunar() {
        return new Promise((resolve) => {
            if (window.Lunar) {
                LunarJS = window.Lunar;
                resolve();
            } else {
                setTimeout(() => waitForLunar().then(resolve), 100);
            }
        });
    }

    // 获取准确农历信息
    function getAccurateLunar(year, month, day) {
        try {
            const solar = Lunar.Solar.fromYmd(year, month, day);
            const lunar = solar.getLunar();
            return {
                year: lunar.getYear(),
                month: lunar.getMonth(),
                day: lunar.getDay(),
                monthName: lunar.getMonthInChinese(),
                dayName: lunar.getDayInChinese(),
                isLeap: lunar.isLeap(),
                ganZhiYear: lunar.getYearInGanZhi(),
                ganZhiMonth: lunar.getMonthInGanZhi(),
                ganZhiDay: lunar.getDayInGanZhi()
            };
        } catch(e) {
            console.error('农历转换错误:', e);
            return null;
        }
    }

    function formatLunarDate(lunar) {
        if (!lunar) return '計算錯誤';
        const leap = lunar.isLeap ? '閏' : '';
        return `${lunar.year}年 ${leap}${lunar.monthName} ${lunar.dayName}`;
    }

    function generatePalaceData(lunarMonth, lunarDay, timeBranchIdx) {
        let startPos = 2;
        let monthOffset = (lunarMonth - 1) % 12;
        let tempPos = (startPos + monthOffset) % 12;
        let mingPalaceIdx = (tempPos - timeBranchIdx + 12) % 12;
        let palaceArr = [];
        for (let i = 0; i < 12; i++) {
            let dz = EARTH_BRANCHES[i];
            let palaceNameIdx = (i - mingPalaceIdx + 12) % 12;
            palaceArr.push({ dz, name: TWELVE_PALACES[palaceNameIdx], major: "", minorFinal: "" });
        }
        let seed = (lunarDay * 7 + timeBranchIdx * 3 + lunarMonth * 11) % 14;
        let ziweiPos = (mingPalaceIdx + seed) % 12;
        palaceArr[ziweiPos].major = MAJOR_STARS[0];
        let tianfuPos = (ziweiPos + 6) % 12;
        palaceArr[tianfuPos].major = MAJOR_STARS[6];
        let secondStarIdx = (mingPalaceIdx + lunarDay) % 12;
        palaceArr[secondStarIdx].major = MAJOR_STARS[1];
        let thirdPos = (mingPalaceIdx + lunarMonth + timeBranchIdx) % 12;
        palaceArr[thirdPos].major = MAJOR_STARS[2];
        let fourthPos = (ziweiPos + 3) % 12;
        palaceArr[fourthPos].major = MAJOR_STARS[3];
        let fifthPos = (tianfuPos + 4) % 12;
        palaceArr[fifthPos].major = MAJOR_STARS[7];
        let sixthPos = (mingPalaceIdx + 7) % 12;
        palaceArr[sixthPos].major = MAJOR_STARS[4];
        let lianzhenPos = (timeBranchIdx + lunarDay) % 12;
        palaceArr[lianzhenPos].major = MAJOR_STARS[5];
        let extraSeed = (lunarDay + lunarMonth) % 7;
        palaceArr[(extraSeed + 5) % 12].major = MAJOR_STARS[8];
        palaceArr[(extraSeed + 9) % 12].major = MAJOR_STARS[9];
        palaceArr[(extraSeed + 1) % 12].major = MAJOR_STARS[10];
        palaceArr[(extraSeed + 11) % 12].major = MAJOR_STARS[11];
        palaceArr[(extraSeed + 3) % 12].major = MAJOR_STARS[12];
        palaceArr[(extraSeed + 7) % 12].major = MAJOR_STARS[13];
        
        let wenChangPos = (timeBranchIdx) % 12;
        let wenQuPos = (12 - timeBranchIdx) % 12;
        let minorList = [];
        minorList[wenChangPos] = "文昌";
        minorList[wenQuPos] = minorList[wenQuPos] ? minorList[wenQuPos] + " 文曲" : "文曲";
        let lucunPos = (timeBranchIdx + lunarDay) % 12;
        minorList[lucunPos] = minorList[lucunPos] ? minorList[lucunPos] + " 祿存" : "祿存";
        for (let i = 0; i < 12; i++) {
            palaceArr[i].minorFinal = minorList[i] || (i === (mingPalaceIdx+4)%12 ? "天魁" : (i === (mingPalaceIdx+8)%12 ? "天鉞" : "福星高照"));
            if (!palaceArr[i].major) palaceArr[i].major = "天福吉星";
        }
        return palaceArr;
    }

    // UI 元素
    const pickerBtn = document.getElementById('btn-picker');
    const manualBtn = document.getElementById('btn-manual');
    const datePickerInput = document.getElementById('date-picker');
    const manualDiv = document.getElementById('manual-inputs');
    const liveInfo = document.getElementById('date-live-info');
    const radioSolar = document.querySelector('input[value="solar"]');
    const radioLunar = document.querySelector('input[value="lunar"]');

    // 更新显示
    async function refreshLiveInfo() {
        await waitForLunar();
        let y, m, d;
        const isPickerMode = pickerBtn.classList.contains('active');
        if (isPickerMode && datePickerInput.value) {
            [y, m, d] = datePickerInput.value.split('-').map(Number);
        } else if (!isPickerMode) {
            y = parseInt(document.getElementById('in-year').value) || 2026;
            m = parseInt(document.getElementById('in-month').value) || 5;
            d = parseInt(document.getElementById('in-day').value) || 17;
        } else return;
        if (!y || !m || !d) return;
        
        if (radioSolar.checked) {
            const lunar = getAccurateLunar(y, m, d);
            if (lunar) {
                liveInfo.innerHTML = `📅 公曆：${y}年${m}月${d}日 &nbsp; 🌙 農曆：${formatLunarDate(lunar)} (${lunar.ganZhiYear}年 ${lunar.ganZhiMonth}月 ${lunar.ganZhiDay}日)`;
            } else {
                liveInfo.innerHTML = `📅 公曆：${y}年${m}月${d}日 &nbsp; 🌙 農曆：計算錯誤`;
            }
        } else {
            liveInfo.innerHTML = `🌙 農曆直接輸入：${y}年${m}月${d}日 (排盤以此爲準)`;
        }
    }

    datePickerInput.addEventListener('input', refreshLiveInfo);
    document.getElementById('in-year').addEventListener('input', refreshLiveInfo);
    document.getElementById('in-month').addEventListener('input', refreshLiveInfo);
    document.getElementById('in-day').addEventListener('input', refreshLiveInfo);
    radioSolar.addEventListener('change', refreshLiveInfo);
    radioLunar.addEventListener('change', refreshLiveInfo);
    pickerBtn.addEventListener('click', () => {
        pickerBtn.classList.add('active'); manualBtn.classList.remove('active');
        datePickerInput.classList.remove('hide'); manualDiv.classList.remove('active');
        refreshLiveInfo();
    });
    manualBtn.addEventListener('click', () => {
        manualBtn.classList.add('active'); pickerBtn.classList.remove('active');
        datePickerInput.classList.add('hide'); manualDiv.classList.add('active');
        refreshLiveInfo();
    });
    
    // 初始化
    waitForLunar().then(() => refreshLiveInfo());

    // 排盘
    document.getElementById('start-btn').addEventListener('click', async () => {
        await waitForLunar();
        
        let year, month, day;
        const isPicker = pickerBtn.classList.contains('active');
        if (isPicker && datePickerInput.value) {
            [year, month, day] = datePickerInput.value.split('-').map(Number);
        } else {
            year = parseInt(document.getElementById('in-year').value);
            month = parseInt(document.getElementById('in-month').value);
            day = parseInt(document.getElementById('in-day').value);
        }
        
        const isSolarMode = radioSolar.checked;
        let lunarMonth, lunarDay, extraInfo = "";
        
        if (isSolarMode) {
            const lunar = getAccurateLunar(year, month, day);
            if (lunar) {
                lunarMonth = lunar.month;
                lunarDay = lunar.day;
                extraInfo = `公曆 ${year}-${month}-${day} → 農曆 ${formatLunarDate(lunar)}`;
            } else {
                lunarMonth = month;
                lunarDay = day;
                extraInfo = `公曆 ${year}-${month}-${day} → 農曆轉換失敗`;
            }
        } else {
            lunarMonth = month;
            lunarDay = day;
            extraInfo = `農曆輸入 ${year}年${month}月${day}日`;
        }
        
        const timeIdx = parseInt(document.getElementById('birth-time').value);
        const validLunarDay = Math.min(lunarDay, 30);
        const validLunarMonth = Math.min(Math.max(lunarMonth, 1), 12);
        
        document.getElementById('loading-area').style.display = 'block';
        document.getElementById('result-area').style.display = 'none';
        
        setTimeout(() => {
            document.getElementById('loading-area').style.display = 'none';
            const palaceArr = generatePalaceData(validLunarMonth, validLunarDay, timeIdx);
            const grid = document.getElementById('palace-grid');
            grid.innerHTML = '';
            document.getElementById('result-title').innerHTML = `✨ 紫微斗數命盤 ✨ <span style="font-size:0.7rem; display:block;">${extraInfo} | 時辰：${EARTH_BRANCHES[timeIdx]}時</span>`;
            palaceArr.forEach(p => {
                const card = document.createElement('div'); card.className = 'palace-card';
                card.innerHTML = `<div class="palace-name">${p.name} <span class="palace-dz">${p.dz}宮</span></div><div class="major-star">★ ${p.major}</div><div class="minor-star">✨ ${p.minorFinal}</div>`;
                grid.appendChild(card);
            });
            document.getElementById('result-area').style.display = 'block';
            window.scrollTo({ top: document.getElementById('result-area').offsetTop - 20, behavior: 'smooth' });
        }, 600);
    });

    // 赞助面板
    const supportPanel = document.getElementById('supportPanel');
    const coffeeFab = document.getElementById('coffee-fab');
    const closeSupportBtn = document.getElementById('closeSupportBtn');
    coffeeFab.addEventListener('click', () => supportPanel.style.display = 'flex');
    closeSupportBtn.addEventListener('click', () => supportPanel.style.display = 'none');
    supportPanel.addEventListener('click', (e) => { if(e.target === supportPanel) supportPanel.style.display = 'none'; });
    
    const qrTabs = document.querySelectorAll('.qr-tab');
    const maybankDiv = document.getElementById('maybankQR');
    const tngDiv = document.getElementById('tngQR');
    qrTabs.forEach(tab => {
        tab.addEventListener('click', () => {
            qrTabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const type = tab.getAttribute('data-qr');
            if(type === 'maybank') { maybankDiv.style.display = 'block'; tngDiv.style.display = 'none'; }
            else { maybankDiv.style.display = 'none'; tngDiv.style.display = 'block'; }
        });
    });
</script>
</body>
</html>
