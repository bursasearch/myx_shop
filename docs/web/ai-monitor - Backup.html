<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>个股数据参考 - 学习用途</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --light: #ecf0f1;
            --dark: #2c3e50;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .dashboard-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .dashboard-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--dark) 100%);
            color: white;
            padding: 2rem;
            border-bottom: 5px solid var(--secondary);
        }
        .disclaimer-box {
            background: #fff9e6;
            border-left: 8px solid #f0ad4e;
            border-radius: 12px;
            padding: 1.2rem 1.8rem;
            margin: 1.5rem 2rem;
            box-shadow: 0 4px 12px rgba(240, 173, 78, 0.15);
            font-size: 0.95rem;
            color: #66512c;
            border: 1px solid #fce8b2;
        }
        .disclaimer-box i {
            color: #d9534f;
            margin-right: 8px;
        }
        .disclaimer-title {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 6px;
            color: #b85c00;
        }
        .stock-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            margin-bottom: 20px;
            overflow: hidden;
            cursor: pointer;
        }
        .stock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }
        .stock-card.warrant {
            border-left: 5px solid var(--danger);
        }
        .stock-card.stock {
            border-left: 5px solid var(--success);
        }
        .price-change.positive {
            color: var(--success);
            font-weight: bold;
        }
        .price-change.negative {
            color: var(--danger);
            font-weight: bold;
        }
        .progress-bar-custom {
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
        }
        .alert-box {
            background: #fff3cd;
            border: 2px dashed #ffc107;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
        }
        .klse-action-btn {
            background: linear-gradient(135deg, var(--secondary) 0%, #2980b9 100%);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 10px 20px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .klse-action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }
        .refresh-badge {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: var(--primary);">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-chart-line"></i> 学习工具
            </a>
            <div class="navbar-nav">
                <a class="nav-link" href="index.html"><i class="fas fa-home"></i> 首页</a>
                <a class="nav-link active" href="bursa.html"><i class="fas fa-chart-simple"></i> 数据参考</a>
                <a class="nav-link" href="klse-guide.html"><i class="fas fa-mobile-alt"></i> 使用指南</a>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="dashboard-container">
        
            <div class="disclaimer-box">
                <div class="disclaimer-title">
                    <i class="fas fa-exclamation-triangle"></i> 重要声明
                </div>
                <p style="margin-bottom: 8px;">
                    本页面展示的所有数据均为算法生成，<b>仅供个人学习参考，不构成任何投资建议</b>。
                </p>
                <p style="margin-bottom: 8px;">
                    股市投资存在风险，过去数据不代表未来表现。投资者应自行判断并承担风险。
                </p>
                <p style="margin-bottom: 0;">
                    <strong>本页面未获马来西亚证券委员会 (SC) 认可或授权。</strong>
                </p>
                <div class="text-end mt-2">
                    <span class="badge bg-warning text-dark">📚 仅供学习参考</span>
                </div>
            </div>

            <div class="dashboard-header">
                <div class="row align-items-center">
                    <div class="col-md-8">
                        <h1><i class="fas fa-chart-line"></i> 个股数据参考</h1>
                        <p class="mb-0">算法生成 · 学习用途</p>
                    </div>
                    <div class="col-md-4 text-end">
                        <div class="alert alert-info d-inline-block">
                            <i class="fas fa-sync-alt refresh-badge"></i>
                            数据时间: <span id="lastUpdateTime">加载中...</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row p-4">
                <div class="col-md-4">
                    <div class="card text-center bg-light">
                        <div class="card-body">
                            <h3><i class="fas fa-database text-success"></i> <span id="totalStocks">0</span></h3>
                            <p class="text-muted">样本数量</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card text-center bg-light">
                        <div class="card-body">
                            <h3><i class="fas fa-tag text-warning"></i> <span id="warrantCount">0</span></h3>
                            <p class="text-muted">凭单类</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card text-center bg-light">
                        <div class="card-body">
                            <h3><i class="fas fa-chart-line text-primary"></i> <span id="avgChange">0%</span></h3>
                            <p class="text-muted">平均涨跌</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-4">
                <h3><i class="fas fa-list"></i> 数据列表 <span class="badge bg-secondary">学习参考</span></h3>
                <div class="row" id="stocksContainer">
                    <div class="col-12 text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">加载中...</span>
                        </div>
                        <p class="mt-3">加载数据中...</p>
                    </div>
                </div>
            </div>

            <div class="p-4 border-top">
                <div class="row">
                    <div class="col-md-12">
                        <button class="btn btn-success w-100 py-3" onclick="refreshData()">
                            <i class="fas fa-sync-alt"></i> 刷新数据
                        </button>
                    </div>
                </div>
                <p class="text-muted small mt-3 text-center">
                    <i class="far fa-clock"></i> 数据延迟约15分钟
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const DATA_SOURCE = 'picks_latest.json';
        let stockData = [];
        let lastUpdate = '';

        async function loadData() {
            try {
                const url = DATA_SOURCE + '?t=' + Date.now();
                const response = await fetch(url);
                if (!response.ok) throw new Error('数据加载失败');
                const data = await response.json();
                stockData = data.picks || [];
                lastUpdate = data.last_updated || data.date || '未知';
                updateStats();
                renderCards();
                document.getElementById('lastUpdateTime').textContent = lastUpdate;
            } catch (error) {
                document.getElementById('stocksContainer').innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-danger">数据加载失败: ${error.message}</div>
                    </div>
                `;
            }
        }

        function updateStats() {
            document.getElementById('totalStocks').textContent = stockData.length;
            const warrantCount = stockData.filter(s => s.code && (s.code.includes('-C') || s.code.includes('-W') || s.price < 0.5)).length;
            document.getElementById('warrantCount').textContent = warrantCount;
            const avgChange = stockData.reduce((sum, s) => sum + (s.daily_change || 0), 0) / stockData.length;
            document.getElementById('avgChange').textContent = avgChange.toFixed(2) + '%';
        }

        function renderCards() {
            const container = document.getElementById('stocksContainer');
            if (!stockData.length) {
                container.innerHTML = '<div class="col-12"><div class="alert alert-warning">暂无数据</div></div>';
                return;
            }
            let html = '';
            stockData.forEach(s => {
                const isWarrant = s.code && (s.code.includes('-C') || s.code.includes('-W') || s.price < 0.5);
                const changeClass = (s.daily_change || 0) >= 0 ? 'positive' : 'negative';
                const changeSign = (s.daily_change || 0) >= 0 ? '+' : '';
                const price = s.price || 0;
                html += `
                <div class="col-md-6 col-lg-4">
                    <div class="card stock-card ${isWarrant ? 'warrant' : 'stock'}" onclick="openKLSE('${s.code}')">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div>
                                    <h5 class="card-title mb-1">${s.code} <small class="text-muted">${s.name || ''}</small></h5>
                                    <span class="badge ${isWarrant ? 'bg-danger' : 'bg-success'}">${isWarrant ? '凭单类' : '普通股'}</span>
                                    <span class="badge bg-secondary">${s.sector_name || '其他'}</span>
                                </div>
                                <div class="text-end">
                                    <h4 class="${changeClass} mb-0">RM ${price.toFixed(3)}</h4>
                                    <small class="${changeClass}">${changeSign}${((s.daily_change || 0) * 100).toFixed(2)}%</small>
                                </div>
                            </div>
                            <div class="d-grid gap-2">
                                <button class="btn btn-sm klse-action-btn" onclick="event.stopPropagation(); openKLSE('${s.code}')">
                                    <i class="fas fa-chart-line"></i> 查看详情
                                </button>
                            </div>
                            <small class="text-muted d-block text-center mt-2">点击卡片查看详情</small>
                        </div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function openKLSE(code) {
            window.open(`https://www.klsescreener.com/v2/stocks/view/${code}`, '_blank');
        }

        function refreshData() {
            location.reload();
        }

        loadData();
    </script>
</body>
</html>
