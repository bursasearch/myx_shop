<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>紫微斗数免费排盘 | 命盘解析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #eee;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,215,0,0.2);
        }
        h1 {
            text-align: center;
            color: #FFD966;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }
        h2, h3 {
            color: #FFD966;
            margin-bottom: 15px;
        }
        .form-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .input-field {
            flex: 1;
            min-width: 150px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #FFD966;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid #FFD966;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 16px;
        }
        .calendar-type {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            justify-content: center;
        }
        .calendar-type label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        button {
            background: linear-gradient(135deg, #FFD966, #FFB347);
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            color: #1a1a2e;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.02);
        }
        .result-area {
            overflow-x: auto;
        }
        .palace-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 20px;
        }
        .palace-card {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 12px;
            border-left: 4px solid #FFD966;
        }
        .palace-name {
            font-size: 16px;
            font-weight: bold;
            color: #FFD966;
            margin-bottom: 8px;
        }
        .major-star {
            color: #ff8888;
            font-weight: bold;
            font-size: 13px;
        }
        .minor-star {
            color: #88ff88;
            font-size: 11px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        .spinner {
            border: 4px solid rgba(255,215,0,0.3);
            border-top: 4px solid #FFD966;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error-msg {
            color: #ff8888;
            text-align: center;
            padding: 20px;
            background: rgba(255,0,0,0.1);
            border-radius: 16px;
        }
        .info-text {
            font-size: 12px;
            color: #aaa;
            text-align: center;
            margin-top: 10px;
        }
        @media (max-width: 768px) {
            .palace-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* 支持面板样式 */
        .support-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1050;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .support-card {
            max-width: 380px;
            background: white;
            border-radius: 28px;
            padding: 20px;
            position: relative;
            animation: slideUp 0.3s ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            color: #333;
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
        }
        .close-btn:hover {
            background: #f5f5f5;
        }
        .qr-switch-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            background: #f0f0f0;
            padding: 6px;
            border-radius: 60px;
        }
        .qr-tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .qr-tab.active {
            background: #2c7a2c;
            color: white;
        }
        .qr-tab:not(.active) {
            background: transparent;
            color: #666;
        }
        .qr-container {
            text-align: center;
            margin: 15px 0;
        }
        .qr-code-img {
            width: 100%;
            max-width: 240px;
            height: auto;
            border-radius: 16px;
            margin: 0 auto;
            display: block;
            border: 1px solid #ddd;
            padding: 8px;
            background: white;
        }
        .qr-note {
            background: #e8f5e9;
            padding: 12px;
            border-radius: 16px;
            margin-top: 15px;
            font-size: 13px;
            color: #2e7d32;
            text-align: left;
        }
        .coffee-icon-lg {
            text-align: center;
            font-size: 32px;
            margin-bottom: 10px;
            color: #FF9800;
        }
        #coffee-fab {
            position: fixed;
            bottom: 90px;
            right: 25px;
            z-index: 1040;
            background: #FF9800;
            color: white;
            border: none;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        #coffee-fab:hover {
            transform: scale(1.1);
            background: #F57C00;
        }
    </style>
    <!-- 尝试多个 CDN 加载 iztro -->
    <script>
        // 备用 CDN 列表
        const cdnList = [
            'https://unpkg.com/iztro@2.4.7/dist/iztro.umd.js',
            'https://cdn.jsdelivr.net/npm/iztro@2.4.7/dist/iztro.umd.js',
            'https://fastly.jsdelivr.net/npm/iztro@2.4.7/dist/iztro.umd.js'
        ];
        
        let currentCdnIndex = 0;
        
        function loadIztro() {
            if (currentCdnIndex >= cdnList.length) {
                const loadingDiv = document.getElementById('loading');
                const resultDiv = document.getElementById('result');
                if (loadingDiv) loadingDiv.style.display = 'none';
                if (resultDiv) {
                    resultDiv.innerHTML = '<div class="error-msg">⚠️ 排盘库加载失败，请刷新页面重试<br><small>如果持续失败，请联系管理员</small></div>';
                    resultDiv.style.display = 'block';
                }
                return;
            }
            
            const script = document.createElement('script');
            script.src = cdnList[currentCdnIndex];
            script.onload = function() {
                console.log('iztro 加载成功:', cdnList[currentCdnIndex]);
            };
            script.onerror = function() {
                console.log('iztro 加载失败:', cdnList[currentCdnIndex]);
                currentCdnIndex++;
                loadIztro();
            };
            document.head.appendChild(script);
        }
        
        loadIztro();
    </script>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>🌟 紫微斗数免费排盘 🌟</h1>
        
        <div class="calendar-type">
            <label>
                <input type="radio" name="calendarType" value="solar" checked> 阳历
            </label>
            <label>
                <input type="radio" name="calendarType" value="lunar"> 农历
            </label>
        </div>
        
        <div class="form-group">
            <div class="input-field">
                <label>📅 出生日期</label>
                <input type="date" id="birthDate" required>
            </div>
            <div class="input-field">
                <label>⏰ 出生时间</label>
                <select id="birthHour">
                    <option value="23">子时 (23:00-01:00)</option>
                    <option value="1">丑时 (01:00-03:00)</option>
                    <option value="3">寅时 (03:00-05:00)</option>
                    <option value="5">卯时 (05:00-07:00)</option>
                    <option value="7">辰时 (07:00-09:00)</option>
                    <option value="9">巳时 (09:00-11:00)</option>
                    <option value="11">午时 (11:00-13:00)</option>
                    <option value="13">未时 (13:00-15:00)</option>
                    <option value="15">申时 (15:00-17:00)</option>
                    <option value="17">酉时 (17:00-19:00)</option>
                    <option value="19">戌时 (19:00-21:00)</option>
                    <option value="21">亥时 (21:00-23:00)</option>
                </select>
            </div>
            <div class="input-field">
                <label>⚧ 性别</label>
                <select id="gender">
                    <option value="male">男</option>
                    <option value="female">女</option>
                </select>
            </div>
        </div>
        <div style="text-align: center;">
            <button onclick="getAstrolabe()">✨ 排出命盘 ✨</button>
        </div>
        <div class="info-text">※ 紫微斗数以农历为准，阳历会自动转换</div>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p style="margin-top: 15px;">星曜移位，命盘绘制中...</p>
    </div>

    <div id="result" class="result-area" style="display: none;"></div>
</div>

<!-- 支持面板 -->
<div id="supportPanel" class="support-panel">
    <div class="support-card">
        <button class="close-btn" onclick="hideSupportPanel()">✕</button>
        <div class="coffee-icon-lg">☕</div>
        <h4 style="text-align:center; margin-bottom:8px;">请我喝杯咖啡</h4>
        <p style="text-align:center; color:#666; font-size:13px; margin-bottom:20px;">
            如果紫微斗数服务对您有帮助，欢迎随意支持
        </p>
        <div class="qr-switch-tabs">
            <div class="qr-tab active" onclick="switchQR('maybank')">🏦 Maybank</div>
            <div class="qr-tab" onclick="switchQR('tng')">📱 TnG eWallet</div>
        </div>
        <div id="maybankQR" class="qr-container">
            <img src="images/maybank-qr.jpg" alt="Maybank QR Pay" class="qr-code-img"
                 onerror="this.style.display='none'; document.getElementById('maybankFallback').style.display='block';">
            <div id="maybankFallback" style="display:none; background:#fff3cd; padding:15px; border-radius:12px; color:#856404;">
                ⚠️ Maybank QR码加载失败<br><small>请稍后重试</small>
            </div>
        </div>
        <div id="tngQR" class="qr-container" style="display:none;">
            <img src="images/tng-qr.jpg" alt="TnG eWallet QR" class="qr-code-img"
                 onerror="this.style.display='none'; document.getElementById('tngFallback').style.display='block';">
            <div id="tngFallback" style="display:none; background:#fff3cd; padding:15px; border-radius:12px; color:#856404;">
                ⚠️ TnG QR码加载失败<br><small>请稍后重试</small>
            </div>
        </div>
        <div class="qr-note">
            📖 <strong>使用说明</strong><br>
            1. 打开 Maybank App 或 TnG eWallet<br>
            2. 选择 "DuitNow QR" / "扫描付款"<br>
            3. 扫描上方 QR 码<br>
            4. 输入您想支持的金额<br>
            5. 确认转账即可
        </div>
        <div style="color:#999; font-size:12px; text-align:center; margin-top:12px;">
            ❤️ 感谢每一份支持！
        </div>
    </div>
</div>

<button id="coffee-fab" onclick="showSupportPanel()">☕</button>

<script>
    // =========================
    // 默认日期
    // =========================
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');

    document.getElementById('birthDate').value = `${yyyy}-${mm}-${dd}`;

    // =========================
    // 排盘
    // =========================
    async function getAstrolabe() {

        const loadingDiv = document.getElementById('loading');
        const resultDiv = document.getElementById('result');

        resultDiv.style.display = 'none';
        loadingDiv.style.display = 'block';

        try {

            // -------------------------
            // 检查 iztro
            // -------------------------
            const iztroLib =
                window.iztro ||
                (typeof iztro !== 'undefined' ? iztro : null);

            console.log('iztro =>', iztroLib);

            if (!iztroLib) {
                throw new Error('iztro 排盘库加载失败');
            }

            // -------------------------
            // 获取输入
            // -------------------------
            const birthDate =
                document.getElementById('birthDate').value;

            const hour =
                parseInt(
                    document.getElementById('birthHour').value
                );

            const gender =
                document.getElementById('gender').value;

            const calendarType =
                document.querySelector(
                    'input[name="calendarType"]:checked'
                ).value;

            if (!birthDate) {
                throw new Error('请选择出生日期');
            }

            const [year, month, day] =
                birthDate.split('-').map(Number);

            // -------------------------
            // 排盘
            // -------------------------
            let data;

            if (
                iztroLib.astro &&
                typeof iztroLib.astro.bySolar === 'function'
            ) {

                if (calendarType === 'solar') {

                    data = iztroLib.astro.bySolar(
                        year,
                        month,
                        day,
                        hour,
                        gender === 'male' ? 0 : 1
                    );

                } else {

                    data = iztroLib.astro.byLunar(
                        year,
                        month,
                        day,
                        hour,
                        gender === 'male' ? 0 : 1
                    );
                }

            } else {

                throw new Error(
                    '当前 iztro 版本不支持 astro.bySolar()'
                );
            }

            console.log('排盘数据 =>', data);

            if (!data) {
                throw new Error('排盘失败');
            }

            displayAstrolabe(
                data,
                calendarType,
                { year, month, day }
            );

        } catch (err) {

            console.error(err);

            resultDiv.innerHTML = `
                <div class="error-msg">
                    ❌ ${err.message}
                </div>
            `;

            resultDiv.style.display = 'block';

        } finally {

            loadingDiv.style.display = 'none';
        }
    }

    // =========================
    // 显示命盘
    // =========================
    function displayAstrolabe(
        data,
        calendarType,
        dateInfo
    ) {

        const resultDiv =
            document.getElementById('result');

        // -------------------------
        // 兼容字段
        // -------------------------
        const palaces =
            data.palaces ||
            data.houses ||
            [];

        if (!Array.isArray(palaces)) {

            resultDiv.innerHTML = `
                <div class="error-msg">
                    ❌ 命盘数据格式错误
                </div>
            `;

            resultDiv.style.display = 'block';

            return;
        }

        // -------------------------
        // 八字
        // -------------------------
        let baziText = '未知';

        if (Array.isArray(data.bazi)) {

            baziText = data.bazi.join(' ');
        }

        // -------------------------
        // HTML
        // -------------------------
        let html = `
            <div class="card">

                <h2>
                    📅 输入时间：
                    ${calendarType === 'solar' ? '阳历' : '农历'}
                    ${dateInfo.year}年
                    ${dateInfo.month}月
                    ${dateInfo.day}日
                </h2>

                <h3 style="
                    color:#aaa;
                    font-size:14px;
                    margin-top:5px;
                    line-height:1.6;
                ">

                    性别：${data.gender || '未知'}
                    ｜ 八字：${baziText}
                    ｜ 五行局：${data.fiveElement || '未知'}

                </h3>

            </div>

            <div class="card">

                <h2>🌟 命盘十二宫 🌟</h2>

                <div class="palace-grid">
        `;

        // =========================
        // 十二宫
        // =========================
        palaces.forEach(palace => {

            // -------------------------
            // 主星
            // -------------------------
            const majorStars =
                palace.majorStars ||
                palace.major_star ||
                [];

            let majorText = '无主星';

            if (Array.isArray(majorStars)) {

                majorText =
                    majorStars.map(star => {

                        let name =
                            star.name || star;

                        if (star.mutagen) {
                            name += `(${star.mutagen})`;
                        }

                        return name;

                    }).join(' · ');
            }

            // -------------------------
            // 副星
            // -------------------------
            let minorList = [];

            const minorStars =
                palace.minorStars || [];

            const badStars =
                palace.badStars || [];

            const adjectiveStars =
                palace.adjectiveStars || [];

            minorStars.forEach(s => {
                minorList.push(s.name || s);
            });

            badStars.forEach(s => {
                minorList.push(s.name || s);
            });

            adjectiveStars.forEach(s => {
                minorList.push(s.name || s);
            });

            // -------------------------
            // 宫位名称
            // -------------------------
            const palaceName =
                palace.name ||
                palace.palaceName ||
                '未知宫';

            html += `
                <div class="palace-card">

                    <div class="palace-name">

                        ${palaceName}

                        <span style="
                            font-size:12px;
                            color:#aaa;
                        ">
                            (${palace.decadalKey || ''})
                        </span>

                    </div>

                    <div class="major-star">
                        ${majorText}
                    </div>

                    <div class="minor-star"
                         style="
                            margin-top:5px;
                            min-height:30px;
                            line-height:1.4;
                         ">

                        ${
                            minorList.length > 0
                            ? minorList.slice(0, 8).join(' ')
                            : '无'
                        }

                    </div>

                </div>
            `;
        });

        html += `
                </div>
            </div>
        `;

        // =========================
        // 命主 身主
        // =========================
        if (data.lifeLord || data.bodyLord) {

            html += `
                <div class="card">

                    <h3>📿 核心星曜</h3>

                    <p style="margin-top:10px;">

                        <span style="
                            margin-right:20px;
                            background:rgba(255,215,0,0.1);
                            padding:6px 12px;
                            border-radius:10px;
                        ">
                            命主：
                            ${data.lifeLord || '无'}
                        </span>

                        <span style="
                            background:rgba(255,215,0,0.1);
                            padding:6px 12px;
                            border-radius:10px;
                        ">
                            身主：
                            ${data.bodyLord || '无'}
                        </span>

                    </p>

                </div>
            `;
        }

        // =========================
        // 输出
        // =========================
        resultDiv.innerHTML = html;
        resultDiv.style.display = 'block';
    }

    // =========================
    // 支持面板
    // =========================
    function showSupportPanel() {
        document.getElementById(
            'supportPanel'
        ).style.display = 'flex';
    }

    function hideSupportPanel() {
        document.getElementById(
            'supportPanel'
        ).style.display = 'none';
    }

    document.getElementById(
        'supportPanel'
    )?.addEventListener('click', function(e) {

        if (e.target === this) {
            hideSupportPanel();
        }
    });

    // =========================
    // QR 切换
    // =========================
    function switchQR(type) {

        const maybankDiv =
            document.getElementById('maybankQR');

        const tngDiv =
            document.getElementById('tngQR');

        const tabs =
            document.querySelectorAll('.qr-tab');

        if (type === 'maybank') {

            maybankDiv.style.display = 'block';
            tngDiv.style.display = 'none';

            tabs[0].classList.add('active');
            tabs[1].classList.remove('active');

        } else {

            maybankDiv.style.display = 'none';
            tngDiv.style.display = 'block';

            tabs[0].classList.remove('active');
            tabs[1].classList.add('active');
        }
    }
</script>
</body>
</html>
