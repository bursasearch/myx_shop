<!DOCTYPE html>
<html>
<head>
    <title>最小測試</title>
</head>
<body>
    <h1>GitHub Pages 最小測試</h1>
    <div id="result">測試中...</div>
    
    <script>
        console.log("最小測試開始");
        
        // 測試1：基本JavaScript工作
        document.getElementById('result').innerHTML = "✅ 基本JavaScript工作正常<br>";
        
        // 測試2：加載 picks_history.js
        const script = document.createElement('script');
        script.src = 'js/picks_history.js';
        
        script.onload = function() {
            document.getElementById('result').innerHTML += 
                "✅ picks_history.js 加載成功<br>";
            
            // 測試3：檢查數據
            if (window.allHistoryData) {
                const count = Object.keys(window.allHistoryData).length;
                document.getElementById('result').innerHTML += 
                    `✅ allHistoryData 可用 (${count} 天數據)<br>`;
                
                // 顯示一些數據
                const dates = Object.keys(window.allHistoryData);
                if (dates.length > 0) {
                    const latest = window.allHistoryData[dates[0]];
                    document.getElementById('result').innerHTML += 
                        `最新日期: ${dates[0]} (${latest.picks.length} 隻股票)<br>`;
                }
            } else {
                document.getElementById('result').innerHTML += 
                    "❌ allHistoryData 未定義<br>";
            }
        };
        
        script.onerror = function() {
            document.getElementById('result').innerHTML += 
                "❌ picks_history.js 加載失敗<br>";
            console.error("腳本加載失敗");
        };
        
        document.head.appendChild(script);
    </script>
</body>
</html>
