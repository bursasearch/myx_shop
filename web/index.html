<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bursa Malaysia 股票分析系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1a237e 0%, #311b92 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00bcd4, #4caf50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        .main-link {
            display: inline-block;
            background: linear-gradient(45deg, #2196f3, #4caf50);
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: bold;
            margin: 20px 0;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(33, 150, 243, 0.4);
        }
        .main-link:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(33, 150, 243, 0.6);
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        .feature {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }
        .feature:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
        }
        .feature-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }
        .other-links {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }
        .other-link {
            display: inline-block;
            color: #bbdefb;
            text-decoration: none;
            margin: 0 10px;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        .other-link:hover {
            background: rgba(187, 222, 251, 0.2);
            color: white;
        }
        .auto-redirect {
            margin-top: 20px;
            font-size: 0.9em;
            opacity: 0.8;
        }
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏦 Bursa Malaysia</h1>
        <p class="subtitle">马来西亚股票数据分析系统</p>
        
        <a href="bursa.html" class="main-link">
            🚀 进入股票分析系统
        </a>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">📈</div>
                <h3>实时数据</h3>
                <p>最新的EOD股票数据</p>
            </div>
            <div class="feature">
                <div class="feature-icon">🤖</div>
                <h3>AI推荐</h3>
                <p>智能选股分析</p>
            </div>
            <div class="feature">
                <div class="feature-icon">📊</div>
                <h3>历史分析</h3>
                <p>多日数据对比</p>
            </div>
        </div>
        
        <div class="other-links">
            <p>其他相关链接：</p>
            <a href="data.json" class="other-link" target="_blank">📁 数据文件</a>
            <a href="picks_latest.json" class="other-link" target="_blank">🎯 最新推荐</a>
            <a href="history/" class="other-link" target="_blank">📅 历史数据</a>
        </div>
        
        <p class="auto-redirect">5秒后自动跳转到分析系统...</p>
    </div>
    
    <script>
        // 5秒后自动跳转
        setTimeout(function() {
            window.location.href = "bursa.html";
        }, 5000);
        
        // 显示倒计时
        let count = 5;
        const countdownElement = document.querySelector('.auto-redirect');
        const interval = setInterval(function() {
            count--;
            countdownElement.textContent = count + "秒后自动跳转到分析系统...";
            if (count <= 0) {
                clearInterval(interval);
            }
        }, 1000);
    </script>
</body>
</html>
