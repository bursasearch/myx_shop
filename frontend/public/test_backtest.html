<!DOCTYPE html>
<html>
<head>
    <title>测试股票回测API</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .box { border: 1px solid #ddd; padding: 20px; margin: 20px 0; border-radius: 5px; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 5px; overflow: auto; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>股票回测API测试</h1>
        
        <div class="box">
            <h3>测试1: 健康检查</h3>
            <button onclick="testHealth()">测试 /health</button>
            <div id="healthResult"></div>
        </div>
        
        <div class="box">
            <h3>测试2: 演示回测数据</h3>
            <button onclick="testDemo()">测试 /demo-backtest</button>
            <div id="demoResult"></div>
        </div>
        
        <div class="box">
            <h3>测试3: 实际回测 (Maybank 1155)</h3>
            <button onclick="testReal()">测试 /single-stock-backtest</button>
            <div id="realResult"></div>
        </div>
        
        <div class="box">
            <h3>测试4: 股票列表</h3>
            <button onclick="testStocks()">测试 /api/stocks</button>
            <div id="stocksResult"></div>
        </div>
    </div>
    
    <script>
        function showResult(elementId, data, isError = false) {
            const div = document.getElementById(elementId);
            div.innerHTML = `<pre class="${isError ? 'error' : 'success'}">${JSON.stringify(data, null, 2)}</pre>`;
        }
        
        async function testHealth() {
            try {
                const response = await fetch('/health');
                const data = await response.json();
                showResult('healthResult', data);
            } catch (error) {
                showResult('healthResult', {error: error.message}, true);
            }
        }
        
        async function testDemo() {
            try {
                const response = await fetch('/demo-backtest');
                const data = await response.json();
                showResult('demoResult', data);
            } catch (error) {
                showResult('demoResult', {error: error.message}, true);
            }
        }
        
        async function testReal() {
            try {
                const response = await fetch('/single-stock-backtest', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        stock_code: '1155',
                        start_date: '2024-01-01',
                        end_date: '2024-12-04',
                        initial_investment: 10000
                    })
                });
                const data = await response.json();
                showResult('realResult', data, !data.success);
            } catch (error) {
                showResult('realResult', {error: error.message}, true);
            }
        }
        
        async function testStocks() {
            try {
                const response = await fetch('/api/stocks');
                const data = await response.json();
                showResult('stocksResult', data);
            } catch (error) {
                showResult('stocksResult', {error: error.message}, true);
            }
        }
        
        // 页面加载时自动测试健康检查
        window.onload = testHealth;
    </script>
</body>
</html>
