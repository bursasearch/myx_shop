<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI選股分析 | Myx Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; 
            color: #333;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .nav-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            background: rgba(255,255,255,0.95);
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            color: #333;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        
        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .page-header {
            background: rgba(255,255,255,0.95);
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }
        
        .stock-card {
            background: rgba(255,255,255,0.95);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .performance { color: #48bb78; font-weight: bold; }
        .risk { color: #e53e3e; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-buttons">
            <a href="index.html" class="nav-btn">
                <i class="fas fa-home"></i> 回到主頁
            </a>
            <a href="products.html" class="nav-btn">
                <i class="fas fa-shopping-bag"></i> 聯盟商店
            </a>
            <a href="vehicles.html" class="nav-btn">
                <i class="fas fa-car"></i> 二手車輛
            </a>
        </div>

        <div class="page-header">
            <h1><i class="fas fa-robot"></i> AI選股成績與分析</h1>
            <p>基於人工智能算法的股票分析與推薦</p>
        </div>

        <div class="stock-grid">
            <div class="stock-card">
                <h3>💹 科技股推薦</h3>
                <p>近期表現: <span class="performance">+15.2%</span></p>
                <p>風險等級: <span class="risk">中</span></p>
                <p>AI評分: 88/100</p>
            </div>
            
            <div class="stock-card">
                <h3>🏦 金融股分析</h3>
                <p>近期表現: <span class="performance">+8.7%</span></p>
                <p>風險等級: <span class="risk">低</span></p>
                <p>AI評分: 92/100</p>
            </div>
            
            <div class="stock-card">
                <h3>⚡ 新能源趨勢</h3>
                <p>近期表現: <span class="performance">+22.1%</span></p>
                <p>風險等級: <span class="risk">高</span></p>
                <p>AI評分: 76/100</p>
            </div>
        </div>
    </div>
</body>
</html>
