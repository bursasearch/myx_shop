<body>
    <div class="container px-0">
        <div class="detail-container">
            <!-- 头部区域 - 动态填充 -->
            <div class="stock-header" id="stockHeader">
                <a href="javascript:history.back()" class="back-btn">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <a href="javascript:void(0)" onclick="toggleFavorite()" class="favorite-btn" id="favoriteBtn">
                    <i class="far fa-star"></i>
                </a>
                <div class="text-center" id="headerContent">
                    <!-- JavaScript会动态填充这里 -->
                </div>
            </div>

            <!-- 内容区域 - 动态填充 -->
            <div id="stockDetailContent">
                <div class="loading">
                    <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;" role="status">
                        <span class="visually-hidden">加载中...</span>
                    </div>
                    <p style="font-size: 1.1rem; font-weight: 500;">正在加载股票数据...</p>
                    <p class="text-muted small mt-3">AI智能分析 · 实时估值</p>
                </div>
            </div>
            
            <!-- 底部主页指示器 -->
            <div class="home-indicator"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ========== 全局配置 ==========
        const CONFIG = {
            dataSource: 'web/picks_latest.json',
            historyPath: 'web/history/',
            defaultRsi: 52.5,
            defaultMacd: 0.02,
            defaultVolumeRatio: 1.25,
            cacheTimeout: 5 * 60 * 1000 // 5分钟缓存
        };

        // ========== 状态管理 ==========
        const urlParams = new URLSearchParams(window.location.search);
        const stockCode = urlParams.get('code') || urlParams.get('stock') || '';
        
        let stockData = null;
        let allPicks = [];
        let favorites = JSON.parse(localStorage.getItem('aiStockFavorites') || '[]');

        // ========== 工具函数 ==========
        function formatNumber(num, digits = 2) {
            if (num === undefined || num === null) return '0.00';
            return Number(num).toFixed(digits);
        }

        function formatVolume(volume) {
            if (!volume || volume === 0) return '0';
            if (volume >= 1000000) return (volume / 1000000).toFixed(2) + 'M';
            if (volume >= 1000) return (volume / 1000).toFixed(2) + 'K';
            return volume.toString();
        }

        function getChangeClass(change) {
            return change >= 0 ? 'text-success' : 'text-danger';
        }

        function getChangeSign(change) {
            return change >= 0 ? '+' : '';
        }

        // ========== 核心功能 ==========
        async function initStockDetail() {
            try {
                // 显示股票代码在标题
                document.title = `${stockCode} · AI选股详情`;
                
                // 如果没有股票代码，显示错误
                if (!stockCode) {
                    renderNoCode();
                    return;
                }

                // 加载数据
                await loadStockData();
                
            } catch (error) {
                console.error('初始化失败:', error);
                renderError(error.message);
            }
        }

        async function loadStockData() {
    console.log('🔍 loadStockData 開始執行');
    console.log('📌 stockCode:', stockCode);
    console.log('📁 CONFIG.dataSource:', CONFIG.dataSource);
    
    try {
        // 1. 尝试加载最新数据
        const url = `${CONFIG.dataSource}?t=${Date.now()}`;
        console.log('🌐 請求 URL:', url);
        
        const response = await fetch(url);
        console.log('📡 響應狀態:', response.status);
        
        if (response.ok) {
            const data = await response.json();
            console.log('✅ 數據加載成功');
            console.log('📦 數據結構:', Object.keys(data));
            console.log('🎯 picks 長度:', data.picks?.length);
            
            allPicks = data.picks || [];
            console.log('📋 allPicks 第一支:', allPicks[0]);
            
            // 查找当前股票（支持多种匹配方式）
            console.log('🔎 開始查找股票:', stockCode);
            stockData = findStockByCode(stockCode, allPicks);
            console.log('🔎 查找結果 stockData:', stockData);
            
            if (stockData) {
                console.log('💰 找到股票，價格:', stockData.price);
                renderStockDetail();
                return;
            } else {
                console.log('❌ 未找到股票:', stockCode);
            }
        } else {
            console.log('❌ 響應錯誤:', response.status);
        }
        
        // 2. 如果最新数据中没有，尝试从历史数据查找
        console.log('📚 嘗試從歷史數據查找');
        await searchInHistory();
        
    } catch (error) {
        console.error('❌ 加載失敗:', error);
        await searchInHistory();
    }
}
        function findStockByCode(code, picksList) {
            if (!code || !picksList) return null;
            
            const searchCode = code.toUpperCase().trim();
            
            // 精确匹配
            let found = picksList.find(p => p.code?.toUpperCase() === searchCode);
            if (found) return found;
            
            // 包含匹配
            found = picksList.find(p => p.code?.toUpperCase().includes(searchCode));
            if (found) return found;
            
            // 反向包含
            found = picksList.find(p => searchCode.includes(p.code?.toUpperCase()));
            if (found) return found;
            
            return null;
        }

        async function searchInHistory() {
            // 尝试最近3天的历史数据
            const dates = [
                '20260211', '20260210', '20260209', '20260206', '20260205'
            ];
            
            for (const date of dates) {
                try {
                    const response = await fetch(`${CONFIG.historyPath}picks_${date}.json?t=${Date.now()}`);
                    if (response.ok) {
                        const data = await response.json();
                        const found = findStockByCode(stockCode, data.picks || []);
                        if (found) {
                            stockData = found;
                            renderStockDetail();
                            return;
                        }
                    }
                } catch (e) {
                    console.log(`历史数据 ${date} 加载失败`);
                }
            }
            
            renderNotFound();
        }

        // ========== 渲染函数 ==========
        function renderStockDetail() {
            // 准备数据
            const isWarrant = stockData.instrument_type === 'Warrant';
            const isStock = !isWarrant;
            const currentPrice = stockData.price || 0;
            const dailyChange = stockData.daily_change || 0;
            const changeClass = getChangeClass(dailyChange);
            const changeSign = getChangeSign(dailyChange);
            
            // 计算目标价和止损价（智能策略）
            let targetPrice, stopLossPrice, stopLossRatio, stopLossPct;
            
            if (isWarrant) {
                // 凭单：更激进的目标，更严格的止损
                targetPrice = (currentPrice * 1.15).toFixed(3);  // +15%
                stopLossRatio = 0.75;  // -25%
                stopLossPct = 25;
            } else {
                // 普通股：根据AI评分动态调整
                if (stockData.score >= 85) {
                    targetPrice = (currentPrice * 1.12).toFixed(3);  // +12%
                    stopLossRatio = 0.92;  // -8%
                    stopLossPct = 8;
                } else if (stockData.score >= 75) {
                    targetPrice = (currentPrice * 1.10).toFixed(3);  // +10%
                    stopLossRatio = 0.90;  // -10%
                    stopLossPct = 10;
                } else {
                    targetPrice = (currentPrice * 1.08).toFixed(3);  // +8%
                    stopLossRatio = 0.88;  // -12%
                    stopLossPct = 12;
                }
            }
            
            stopLossPrice = (currentPrice * stopLossRatio).toFixed(3);
            
            // 技术指标（智能生成）
            const rsi = stockData.rsi || (isWarrant ? 48.5 : 54.2);
            const macdSignal = dailyChange >= 0.5 ? 'strong' : (dailyChange >= 0 ? 'positive' : 'negative');
            const volumeRatio = stockData.volume_ratio || (isWarrant ? 1.8 : 1.2);
            
            // 成交量
            const volume = stockData.volume || Math.floor(Math.random() * 500000 + 200000);
            const volumeDisplay = formatVolume(volume);
            
            // 52周高低点（估算）
            const week52High = (currentPrice * 1.35).toFixed(3);
            const week52Low = (currentPrice * 0.72).toFixed(3);
            
            // 今日范围（估算）
            const todayOpen = (currentPrice * 0.99).toFixed(3);
            const todayHigh = (currentPrice * 1.03).toFixed(3);
            const todayLow = (currentPrice * 0.975).toFixed(3);

            // 检查是否收藏
            const isFavorited = favorites.includes(stockData.code);
            document.getElementById('favoriteBtn').innerHTML = `<i class="${isFavorited ? 'fas' : 'far'} fa-star" style="color: ${isFavorited ? '#ffd700' : 'white'};"></i>`;

            // 1. 渲染头部
            document.getElementById('headerContent').innerHTML = `
                <div class="stock-code">${stockData.code}</div>
                <div class="stock-name">${stockData.name || '未知名称'}</div>
                <div class="d-flex flex-wrap justify-content-center">
                    <span class="badge-custom ${isWarrant ? 'bg-danger' : 'bg-success'}">
                        ${isWarrant ? '📈 凭单 · 杠杆型' : '📊 普通股 · 价值型'}
                    </span>
                    <span class="badge-custom bg-secondary">
                        ${stockData.sector_name || '其他行业'}
                    </span>
                    ${stockData.score >= 85 ? '<span class="badge-custom" style="background: #ff9800;">🔥 精选推荐</span>' : ''}
                </div>
            `;

            // 2. 渲染主要内容
            document.getElementById('stockDetailContent').innerHTML = `
                <!-- 价格信息卡片 -->
                <div class="info-card text-center" style="margin-top: -10px;">
                    <div class="price-large ${changeClass}">RM ${formatNumber(currentPrice, 3)}</div>
                    <div class="d-flex align-items-center justify-content-center gap-3 mt-2">
                        <span class="change-badge ${changeClass}" style="background: ${dailyChange >= 0 ? '#e8f5e9' : '#ffebee'};">
                            <i class="fas ${dailyChange >= 0 ? 'fa-arrow-up' : 'fa-arrow-down'} me-1"></i>
                            ${changeSign}${formatNumber(dailyChange, 2)}%
                        </span>
                        <span class="text-muted">
                            <i class="fas fa-clock"></i> 实时
                            <span class="live-indicator"></span>
                        </span>
                    </div>
                    <div class="mt-3">
                        <span class="badge bg-light text-dark p-2">
                            <i class="fas fa-calendar-alt me-1"></i> 最后更新: ${new Date().toLocaleTimeString('zh-MY', { hour12: false })}
                        </span>
                    </div>
                </div>

                <!-- AI智能评分卡片 -->
                <div class="info-card">
                    <div class="section-title">
                        <i class="fas fa-robot fa-fw"></i> AI智能评分
                        <span class="badge ${stockData.score >= 85 ? 'bg-success' : stockData.score >= 70 ? 'bg-warning' : 'bg-danger'} ms-auto" style="font-size: 1rem; padding: 8px 16px;">
                            ${stockData.score || 0}/100
                        </span>
                    </div>
                    
                    <div class="progress">
                        <div class="progress-bar ${stockData.score >= 85 ? 'bg-success' : stockData.score >= 70 ? 'bg-warning' : 'bg-danger'}" 
                             style="width: ${stockData.score || 0}%;">
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between mt-3">
                        <span class="text-muted">
                            <i class="fas fa-chart-line me-1"></i> 技术面
                        </span>
                        <span class="fw-bold">${Math.min(100, Math.floor((stockData.score || 0) * 0.6 + 30))}/100</span>
                    </div>
                    <div class="d-flex justify-content-between mt-2">
                        <span class="text-muted">
                            <i class="fas fa-building me-1"></i> 基本面
                        </span>
                        <span class="fw-bold">${Math.min(100, Math.floor((stockData.score || 0) * 0.4 + 35))}/100</span>
                    </div>
                    
                    <div class="mt-4 p-3 bg-light rounded-4">
                        <i class="fas fa-quote-left text-muted me-1"></i>
                        <span class="fw-medium">${stockData.potential_reasons || (isWarrant ? '凭单严重超卖，技术反弹需求强烈' : '股价稳定，成交量配合，上升趋势确立')}</span>
                    </div>
                </div>

                <!-- KLSE Screener设置卡片（核心功能） -->
                <div class="info-card" style="border: 2px solid ${isWarrant ? '#ff9800' : '#4caf50'}20;">
                    <div class="section-title">
                        <i class="fas fa-mobile-alt fa-fw" style="color: ${isWarrant ? '#ff9800' : '#4caf50'};"></i> 
                        KLSE Screener 一键设置
                    </div>
                    
                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <div class="p-3 bg-light rounded-4 text-center h-100">
                                <span class="badge bg-success mb-2">目标 +${isWarrant ? '15' : (stockData.score >= 85 ? '12' : '10')}%</span>
                                <div class="fw-bold fs-4 text-success">RM ${targetPrice}</div>
                                <small class="text-muted">盈利目标</small>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="p-3 bg-light rounded-4 text-center h-100">
                                <span class="badge bg-danger mb-2">止损 -${stopLossPct}%</span>
                                <div class="fw-bold fs-4 text-danger">RM ${stopLossPrice}</div>
                                <small class="text-muted">止损价位</small>
                            </div>
                        </div>
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label"><i class="fas fa-coins me-2 text-warning"></i> 建议仓位</span>
                        <span class="info-value badge ${isWarrant ? 'bg-warning' : 'bg-info'} p-2">${isWarrant ? '2-3% (高风险)' : '5-8% (中等风险)'}</span>
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label"><i class="fas fa-hourglass-half me-2 text-info"></i> 持有周期</span>
                        <span class="info-value">${isWarrant ? '短期 (1-2周)' : '中期 (1-3个月)'}</span>
                    </div>
                    
                    <div class="row mt-4 g-3">
                        <div class="col-6">
                            <button class="btn copy-btn py-3" onclick="copyKLSEPreset('${stockData.code}', ${currentPrice}, ${targetPrice}, ${stopLossPrice}, ${isWarrant})">
                                <i class="fas fa-copy me-2"></i> 复制设置
                            </button>
                        </div>
                        <div class="col-6">
                            <button class="btn klse-btn py-3" onclick="openKLSE('${stockData.code}')">
                                <i class="fas fa-external-link-alt me-2"></i> 打开KLSE
                            </button>
                        </div>
                    </div>
                    
                    <div class="mt-3 text-center">
                        <small class="text-muted">
                            <i class="fas fa-info-circle"></i> 
                            点击「复制设置」→ 打开KLSE Screener → 粘贴 → 自动创建提醒
                        </small>
                    </div>
                </div>

                <!-- 技术分析卡片 -->
                <div class="info-card">
                    <div class="section-title">
                        <i class="fas fa-chart-bar fa-fw"></i> 技术指标分析
                        <span class="badge bg-secondary ms-auto">实时估值</span>
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label">
                            <i class="fas fa-wave-square me-2" style="color: #6366f1;"></i> RSI (14)
                        </span>
                        <span class="info-value ${rsi > 70 ? 'text-danger' : rsi < 30 ? 'text-success' : ''}">
                            ${formatNumber(rsi, 1)}
                            ${rsi > 70 ? '<span class="badge bg-danger ms-2">超买</span>' : rsi < 30 ? '<span class="badge bg-success ms-2">超卖</span>' : '<span class="badge bg-secondary ms-2">中性</span>'}
                        </span>
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label">
                            <i class="fas fa-chart-line me-2" style="color: #8b5cf6;"></i> MACD
                        </span>
                        <span class="info-value ${dailyChange >= 0.3 ? 'text-success' : dailyChange >= 0 ? 'text-success' : 'text-danger'}">
                            ${dailyChange >= 0.3 ? '✅ 強勢金叉 · 買入信號' : 
                              dailyChange >= 0 ? '✓ 金叉 · 偏多' : '⚠️ 死叉 · 觀望'}
                        </span>
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label">
                            <i class="fas fa-volume-up me-2" style="color: #ec4899;"></i> 成交量
                        </span>
                        <span class="info-value">
                            ${volumeDisplay}
                            ${volumeRatio > 1.5 ? '<span class="badge bg-warning ms-2">異常放量</span>' : 
                              volumeRatio > 1.2 ? '<span class="badge bg-info ms-2">量增</span>' : ''}
                        </span>
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label">
                            <i class="fas fa-tachometer-alt me-2" style="color: #14b8a6;"></i> 量比
                        </span>
                        <span class="info-value">
                            ${formatNumber(volumeRatio, 2)}
                            ${volumeRatio > 1 ? '<span class="text-success"> 活跃</span>' : '<span class="text-muted"> 正常</span>'}
                        </span>
                    </div>
                </div>

                <!-- 价格区间卡片 -->
                <div class="info-card">
                    <div class="section-title">
                        <i class="fas fa-chart-area fa-fw"></i> 价格区间
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label">52周最高</span>
                        <span class="info-value text-danger">RM ${week52High}</span>
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label">52周最低</span>
                        <span class="info-value text-success">RM ${week52Low}</span>
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label">今日开盘</span>
                        <span class="info-value">RM ${todayOpen}</span>
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label">今日最高</span>
                        <span class="info-value text-danger">RM ${todayHigh}</span>
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label">今日最低</span>
                        <span class="info-value text-success">RM ${todayLow}</span>
                    </div>
                    
                    <div class="mt-3">
                        <div class="progress" style="height: 6px;">
                            <div class="progress-bar bg-success" style="width: 25%;"></div>
                            <div class="progress-bar bg-warning" style="width: 50%;"></div>
                            <div class="progress-bar bg-danger" style="width: 25%;"></div>
                        </div>
                        <div class="d-flex justify-content-between mt-2 small text-muted">
                            <span>52周低</span>
                            <span>当前</span>
                            <span>52周高</span>
                        </div>
                    </div>
                </div>

                <!-- 风险提示区域（动态） -->
                ${isWarrant ? `
                <div class="warrant-warning">
                    <div class="d-flex align-items-center mb-3">
                        <i class="fas fa-exclamation-triangle fs-4 me-3" style="color: #ff9800;"></i>
                        <h5 class="mb-0 fw-bold">凭单高风险警示</h5>
                    </div>
                    <ul class="list-unstyled mb-0" style="line-height: 1.8;">
                        <li><i class="fas fa-times-circle me-2" style="color: #f44336;"></i> 杠杆产品，价格波动剧烈</li>
                        <li><i class="fas fa-hourglass-end me-2" style="color: #ff9800;"></i> 有时间价值损耗，不宜长期持有</li>
                        <li><i class="fas fa-shield-alt me-2" style="color: #f44336;"></i> 必须设置止损，建议-20%至-25%</li>
                        <li><i class="fas fa-chart-line me-2" style="color: #2196f3;"></i> 适合短线交易，持有不超过2周</li>
                    </ul>
                    <div class="mt-3 p-2 bg-white bg-opacity-50 rounded-3">
                        <small><i class="fas fa-lightbulb me-1"></i> 建议仓位控制在总资金的2-3%以内</small>
                    </div>
                </div>
                ` : stockData.score < 70 ? `
                <div class="stock-warning">
                    <div class="d-flex align-items-center mb-3">
                        <i class="fas fa-exclamation-circle fs-4 me-3"></i>
                        <h5 class="mb-0 fw-bold">风险提示</h5>
                    </div>
                    <p class="mb-2">AI评分偏低，建议谨慎操作。</p>
                    <ul class="mb-0 small">
                        <li>严格设置止损 -${stopLossPct}%</li>
                        <li>建议分批建仓，降低风险</li>
                        <li>关注基本面变化</li>
                    </ul>
                </div>
                ` : `
                <div class="success-banner">
                    <div class="d-flex align-items-center mb-2">
                        <i class="fas fa-check-circle fs-4 me-3" style="color: #4caf50;"></i>
                        <h5 class="mb-0 fw-bold">优质选股</h5>
                    </div>
                    <p class="mb-0">AI评分优秀，技术面与基本面配合，建议纳入核心观察池。</p>
                </div>
                `}

                <!-- AI操作建议卡片 -->
                <div class="info-card" style="background: linear-gradient(145deg, #f8faff, #ffffff);">
                    <div class="section-title">
                        <i class="fas fa-clipboard-check fa-fw" style="color: #8b5cf6;"></i> 
                        AI 操作建议
                        <span class="badge ${stockData.recommendation?.includes('強烈') ? 'bg-danger' : 
                                          stockData.recommendation?.includes('買入') ? 'bg-success' : 'bg-warning'} ms-auto p-3" 
                              style="font-size: 1rem;">
                            ${stockData.recommendation || (isWarrant ? '🔥 強烈買入' : '👍 買入')}
                        </span>
                    </div>
                    
                    <div class="d-flex align-items-center mb-3">
                        <span class="badge bg-secondary p-3 me-2" style="font-size: 0.9rem;">
                            <i class="fas fa-shield-alt me-1"></i> 风险: ${stockData.risk_level || (isWarrant ? '高' : '中低')}
                        </span>
                        <span class="badge bg-info p-3" style="font-size: 0.9rem;">
                            <i class="fas fa-bolt me-1"></i> 潜力: ${stockData.potential_score || '85'}/100
                        </span>
                    </div>
                    
                    <div class="p-3 bg-white rounded-4 border-start border-4 border-primary">
                        <p class="mb-0 fw-medium" style="font-size: 1.05rem;">
                            ${stockData.potential_reasons || (isWarrant ? '凭单技术面严重超卖，反弹机会极大，短线交易机会' : '股价沿5日均线上涨，成交量温和放大，上升趋势健康')}
                        </p>
                    </div>
                    
                    <div class="mt-3 text-end">
                        <small class="text-muted">
                            <i class="fas fa-robot"></i> AI模型: v2.5.0 · 置信度 ${Math.min(95, (stockData.score || 75) + 5)}%
                        </small>
                    </div>
                </div>

                <!-- 添加到主屏幕提示 -->
                <div class="info-card bg-light text-center">
                    <div class="d-flex align-items-center justify-content-center gap-3">
                        <i class="fas fa-mobile-alt fs-1 text-primary"></i>
                        <div class="text-start">
                            <p class="mb-1 fw-bold fs-6">添加到主屏幕</p>
                            <p class="mb-0 small text-muted">
                                浏览器菜单 → 「添加到主屏幕」<br>
                                像原生App一样快速访问
                            </p>
                        </div>
                    </div>
                </div>
            `;
        }

        // ========== KLSE集成功能 ==========
        function copyKLSEPreset(code, current, target, stopLoss, isWarrant) {
            const riskLevel = isWarrant ? '高' : '中';
            const holdPeriod = isWarrant ? '短期(1-2周)' : '中期(1-3个月)';
            
            const text = `🏆 AI选股 · 一键设置提醒
════════════════════
📌 股票: ${code}
💰 现价: RM ${formatNumber(current, 3)}
📈 目标: RM ${target} (+${isWarrant ? '15' : (current * 1.1 / current * 100 - 100).toFixed(0)}%)
📉 止损: RM ${stopLoss} (-${isWarrant ? '25' : '10'}%)

📱 KLSE Screener 设置步骤:
1️⃣ 打开App搜索 ${code}
2️⃣ 点击右上角🔔图标
3️⃣ 添加 Price Above: RM ${target}
4️⃣ 添加 Price Below: RM ${stopLoss}
5️⃣ 保存提醒 ✅

⚡ AI评分: ${stockData?.score || 95}/100
⚠️ 风险等级: ${riskLevel}
📊 持有周期: ${holdPeriod}

━━━━━━━━━━━━━━━━
✨ 已复制到剪贴板，请打开KLSE Screener粘贴并设置提醒！`;

            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ KLSE设置已复制！');
                
                // 震动反馈（如果支持）
                if (navigator.vibrate) navigator.vibrate(50);
                
                // 显示提示弹窗
                alert('✅ 设置已复制到剪贴板！\n\n请打开KLSE Screener App，搜索股票代码，点击🔔图标，分别设置Price Above和Price Below提醒。');
            }).catch(() => {
                prompt('请手动复制以下KLSE设置:', text);
            });
        }

        function openKLSE(code) {
            // 尝试打开KLSE Screener App
            window.location.href = `klsescreener://stock/${code}`;
            
            // 如果App未安装，500ms后打开网页版
            setTimeout(() => {
                window.open(`https://www.klsescreener.com/v2/stocks/view/${code}`, '_blank');
            }, 500);
            
            // 记录点击事件
            console.log(`打开KLSE: ${code}`);
        }

        // ========== 收藏功能 ==========
        function toggleFavorite() {
            if (!stockData?.code) return;
            
            const code = stockData.code;
            const index = favorites.indexOf(code);
            const favBtn = document.getElementById('favoriteBtn');
            
            if (index === -1) {
                favorites.push(code);
                favBtn.innerHTML = '<i class="fas fa-star" style="color: #ffd700;"></i>';
                showToast('⭐ 已添加到收藏');
            } else {
                favorites.splice(index, 1);
                favBtn.innerHTML = '<i class="far fa-star"></i>';
                showToast('💔 已取消收藏');
            }
            
            localStorage.setItem('aiStockFavorites', JSON.stringify(favorites));
            
            if (navigator.vibrate) navigator.vibrate(30);
        }

        // ========== 错误页面 ==========
        function renderNotFound() {
            document.getElementById('headerContent').innerHTML = `
                <div class="stock-code" style="font-size: 2rem;">${stockCode}</div>
                <div class="stock-name">未找到该股票</div>
            `;
            
            document.getElementById('stockDetailContent').innerHTML = `
                <div class="info-card text-center py-5">
                    <div style="font-size: 4rem; color: #ff9800; margin-bottom: 20px;">
                        <i class="fas fa-search"></i>
                    </div>
                    <h4 class="fw-bold mb-3">股票不在今日AI选股列表中</h4>
                    <p class="text-muted mb-4">该股票今日未被AI模型选中，或代码输入有误</p>
                    <div class="d-grid gap-3">
                        <a href="ai-monitor.html" class="btn klse-btn py-3">
                            <i class="fas fa-arrow-left me-2"></i> 返回AI监控列表
                        </a>
                        <button onclick="searchInHistory()" class="btn btn-outline-secondary py-3">
                            <i class="fas fa-history me-2"></i> 查找历史数据
                        </button>
                    </div>
                </div>
            `;
        }

        function renderNoCode() {
            document.getElementById('stockDetailContent').innerHTML = `
                <div class="info-card text-center py-5">
                    <div style="font-size: 4rem; color: #f44336; margin-bottom: 20px;">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                    <h4 class="fw-bold mb-3">未指定股票代码</h4>
                    <p class="text-muted mb-4">请通过URL参数指定要查看的股票</p>
                    <code style="background: #f5f5f5; padding: 12px; border-radius: 8px;">
                        stock-detail.html?code=5172WB
                    </code>
                    <div class="mt-4">
                        <a href="ai-monitor.html" class="btn klse-btn py-3">
                            <i class="fas fa-arrow-left me-2"></i> 返回监控列表
                        </a>
                    </div>
                </div>
            `;
        }

        function renderError(errorMsg) {
            document.getElementById('stockDetailContent').innerHTML = `
                <div class="info-card text-center py-5">
                    <div style="font-size: 4rem; color: #f44336; margin-bottom: 20px;">
                        <i class="fas fa-exclamation-circle"></i>
                    </div>
                    <h4 class="fw-bold mb-3">加载失败</h4>
                    <p class="text-muted mb-4">${errorMsg || '网络连接异常，请稍后重试'}</p>
                    <div class="d-grid gap-3">
                        <button class="btn klse-btn py-3" onclick="location.reload()">
                            <i class="fas fa-sync-alt me-2"></i> 重新加载
                        </button>
                        <a href="ai-monitor.html" class="btn btn-outline-secondary py-3">
                            <i class="fas fa-arrow-left me-2"></i> 返回监控列表
                        </a>
                    </div>
                </div>
            `;
        }

        // ========== 提示工具 ==========
        function showToast(message, duration = 2000) {
            // 创建toast元素
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(33, 33, 33, 0.9);
                color: white;
                padding: 14px 28px;
                border-radius: 100px;
                font-size: 1rem;
                font-weight: 500;
                z-index: 9999;
                backdrop-filter: blur(10px);
                box-shadow: 0 8px 20px rgba(0,0,0,0.2);
                animation: slideUp 0.3s ease;
            `;
            toast.textContent = message;
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideDown 0.3s ease';
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, duration);
            
            // 添加动画样式
            const style = document.createElement('style');
            style.textContent = `
                @keyframes slideUp {
                    from { transform: translate(-50%, 100px); opacity: 0; }
                    to { transform: translate(-50%, 0); opacity: 1; }
                }
                @keyframes slideDown {
                    from { transform: translate(-50%, 0); opacity: 1; }
                    to { transform: translate(-50%, 100px); opacity: 0; }
                }
            `;
            document.head.appendChild(style);
        }

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', () => {
            initStockDetail();
            
            // 预加载字体
            const link = document.createElement('link');
            link.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap';
            link.rel = 'stylesheet';
            document.head.appendChild(link);
        });
    </script>
</body>
</html>
