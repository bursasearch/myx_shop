<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>PushAds Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
    :root{--wa:#25D366;--dark:#075E54;--bg:#f0f2f5;--card:#fff;--text:#333}
    @media (prefers-color-scheme:dark){ :root{--bg:#0b141a;--card:#1e2a38;--text:#e4e6eb} }
    body{margin:0;padding:0;background:#111;font-family:'Roboto',sans-serif;height:100vh;display:flex;justify-content:center;align-items:center;}
    .phone{width:380px;height:840px;background:#000;border-radius:56px;box-shadow:0 20px 60px rgba(0,0,0,.8);position:relative;overflow:hidden;}
    .notch{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:140px;height:32px;background:#000;border-radius:20px;z-index:10;}
    .statusbar{height:50px;background:#000;color:#fff;display:flex;justify-content:space-between;align-items:center;padding:0 24px;font-weight:500;z-index:9;}
    .screen{height:100%;background:var(--bg);border-radius:52px 52px 0 0;overflow:hidden;display:flex;flex-direction:column;}
    .header{background:linear-gradient(135deg,var(--dark),#128C7E);color:#fff;text-align:center;padding:50px 20px 30px;}
    .header h1{margin:0;font-size:28px;font-weight:700;}
    .badge{display:inline-block;margin-top:12px;background:rgba(255,255,255,.25);padding:6px 20px;border-radius:30px;font-size:13px;backdrop-filter:blur(10px);}
    .stats{display:flex;justify-content:space-around;background:var(--card);margin:20px;border-radius:20px;padding:16px 0;box-shadow:0 4px 15px rgba(0,0,0,.1);}
    .stat h2{margin:0;font-size:32px;color:var(--dark);}
    .stat p{margin:5px 0 0;font-size:13px;color:#666;}
    .content{flex:1;padding:0 20px 20px;overflow-y:auto;}
    .section{margin-bottom:24px;}
    .title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:12px;}
    .upload-area{display:flex;gap:12px;margin-bottom:16px;}
    .upload{flex:1;background:var(--card);border:2px dashed #ccc;border-radius:16px;padding:30px 20px;text-align:center;cursor:pointer;transition:.3s;}
    .upload:hover{border-color:var(--wa);background:rgba(37,211,102,.05);}
    .btn{background:linear-gradient(135deg,var(--wa),#128C7E);color:#fff;border:none;padding:16px;border-radius:16px;font-size:16px;font-weight:600;width:100%;margin-top:12px;cursor:pointer;box-shadow:0 4px 15px rgba(37,211,102,.4);}
    .btn.accent{background:linear-gradient(135deg,#667eea,#764ba2);}
    .btn.secondary{background:linear-gradient(135deg,#ff9966,#ff5e62);}
    .customer{background:var(--card);padding:16px;border-radius:16px;margin-bottom:12px;box-shadow:0 4px 12px rgba(0,0,0,.08);}
    .phone-number{font-weight:600;font-size:18px;color:var(--text);}
    .tag{background:#e3f2fd;color:#1976d2;padding:4px 12px;border-radius:20px;font-size:12px;float:right;}
    .msg{margin:12px 0;padding:14px;background:#f1f3f4;border-radius:12px;font-size:14.8px;line-height:1.5;color:#000;white-space:pre-line;}
    .bottom-bar{height:60px;background:#000;}
    .config-panel{background:var(--card);border-radius:16px;padding:16px;margin-bottom:16px;}
    .select-wrapper{margin-bottom:12px;}
    select{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:14px;}
    .message-preview{max-height:120px;overflow-y:auto;}
    .loading{text-align:center;padding:20px;color:#666;}
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="statusbar">
    <div id="time">19:04</div>
    <div>5G 100%</div>
  </div>
  <div class="screen">
    <div class="header">
      <h1>PushAds Pro</h1>
      <p>專業批量營銷工具</p>
      <div class="badge">MyxShop 出品</div>
    </div>

    <div class="stats">
      <div class="stat"><h2 id="total">0</h2><p>總客戶</p></div>
      <div class="stat"><h2 id="new">0</h2><p>待發送</p></div>
      <div class="stat"><h2 id="sent">0</h2><p>今日已發</p></div>
    </div>

    <div class="content">
      <!-- 配置面板 -->
      <div class="config-panel">
        <div class="title">消息配置</div>
        <div class="select-wrapper">
          <label>選擇消息類別：</label>
          <select id="messageCategory" onchange="updateMessagePreview()">
            <option value="">-- 請選擇類別 --</option>
          </select>
        </div>
        <div class="message-preview" id="messagePreview">
          <div class="loading">請先上傳 messages.json</div>
        </div>
      </div>

      <!-- 上傳區域 -->
      <div class="section">
        <div class="title">上傳數據文件</div>
        <div class="upload-area">
          <div class="upload" onclick="uploadFile('customers')">
            <div style="font-size:40px;margin-bottom:8px;">👥</div>
            <div style="font-weight:500;">客戶數據</div>
            <div style="color:#888;font-size:12px;margin-top:4px;">customers.json</div>
            <div id="customerStatus" style="font-size:11px;color:#25D366;margin-top:4px;"></div>
          </div>
          <div class="upload" onclick="uploadFile('messages')">
            <div style="font-size:40px;margin-bottom:8px;">💬</div>
            <div style="font-weight:500;">消息模板</div>
            <div style="color:#888;font-size:12px;margin-top:4px;">messages.json</div>
            <div id="messageStatus" style="font-size:11px;color:#25D366;margin-top:4px;"></div>
          </div>
        </div>
        <input type="file" id="customersFile" accept=".json" style="display:none">
        <input type="file" id="messagesFile" accept=".json" style="display:none">
      </div>

      <!-- 客戶列表 -->
      <div id="customerList"></div>

      <!-- 操作按鈕 -->
      <button class="btn secondary" onclick="clearAllData()">清除所有數據</button>
      <button class="btn accent" onclick="location.reload()">刷新頁面</button>
    </div>
    <div class="bottom-bar"></div>
  </div>
</div>

<script>
// 全局數據存儲
let allCustomers = [];
let allMessages = {};
let selectedCategory = '';

// 文件上傳處理
function uploadFile(type) {
  const fileId = type === 'customers' ? 'customersFile' : 'messagesFile';
  document.getElementById(fileId).click();
}

// 初始化文件監聽
document.getElementById('customersFile').addEventListener('change', e => handleFileUpload(e, 'customers'));
document.getElementById('messagesFile').addEventListener('change', e => handleFileUpload(e, 'messages'));

async function handleFileUpload(event, type) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const json = JSON.parse(e.target.result);
      
      if (type === 'customers') {
        allCustomers = json.customers || json.clients || json;
        if (!Array.isArray(allCustomers)) {
          throw new Error('客戶數據格式錯誤');
        }
        updateStatus('customerStatus', `✓ 已加載 ${allCustomers.length} 個客戶`);
      } else if (type === 'messages') {
        const messages = json.messages || json;
        if (!Array.isArray(messages)) {
          throw new Error('消息格式錯誤');
        }
        
        // 按類別組織消息
        allMessages = {};
        messages.forEach(msg => {
          if (!allMessages[msg.category]) {
            allMessages[msg.category] = [];
          }
          allMessages[msg.category].push(msg);
        });
        
        updateStatus('messageStatus', `✓ 已加載 ${messages.length} 條消息`);
        populateCategoryDropdown();
      }
      
      // 如果有兩個文件都上傳了，開始渲染
      if (allCustomers.length > 0 && Object.keys(allMessages).length > 0) {
        render();
      }
    } catch (err) {
      alert(`文件解析錯誤 (${type}.json): ${err.message}`);
      updateStatus(`${type}Status`, '✗ 解析失敗');
    }
  };
  
  reader.readAsText(file);
}

// 填充類別下拉選單
function populateCategoryDropdown() {
  const select = document.getElementById('messageCategory');
  select.innerHTML = '<option value="">-- 請選擇類別 --</option>';
  
  Object.keys(allMessages).forEach(category => {
    const option = document.createElement('option');
    option.value = category;
    option.textContent = `${category} (${allMessages[category].length}條)`;
    select.appendChild(option);
  });
  
  // 如果有客戶數據，嘗試匹配第一個客戶的類別
  if (allCustomers.length > 0 && allCustomers[0].interest) {
    const firstCategory = allCustomers[0].interest[0];
    if (allMessages[firstCategory]) {
      select.value = firstCategory;
      selectedCategory = firstCategory;
      updateMessagePreview();
    }
  }
}

// 更新消息預覽
function updateMessagePreview() {
  const select = document.getElementById('messageCategory');
  const preview = document.getElementById('messagePreview');
  selectedCategory = select.value;
  
  if (!selectedCategory || !allMessages[selectedCategory]) {
    preview.innerHTML = '<div class="loading">請選擇消息類別</div>';
    return;
  }
  
  const messages = allMessages[selectedCategory];
  preview.innerHTML = `
    <div style="margin-bottom:8px;">
      <strong>${selectedCategory}</strong> 類別 (${messages.length}條消息)
    </div>
    <select id="messageSelect" onchange="updateSelectedMessage()" style="width:100%;margin-bottom:8px;">
      ${messages.map((msg, index) => 
        `<option value="${index}">消息 ${index + 1}${msg.platform ? ` (${msg.platform})` : ''}</option>`
      ).join('')}
    </select>
    <div class="msg" style="font-size:13px;padding:10px;">
      ${messages[0].text.substring(0, 150)}${messages[0].text.length > 150 ? '...' : ''}
    </div>
  `;
}

// 更新選擇的消息
function updateSelectedMessage() {
  const select = document.getElementById('messageSelect');
  const preview = document.querySelector('#messagePreview .msg');
  if (!select || !preview) return;
  
  const messages = allMessages[selectedCategory];
  const msg = messages[select.value];
  preview.textContent = msg.text.substring(0, 200) + (msg.text.length > 200 ? '...' : '');
}

// 獲取當前選擇的消息
function getSelectedMessage() {
  if (!selectedCategory || !allMessages[selectedCategory]) {
    return null;
  }
  
  const messages = allMessages[selectedCategory];
  const select = document.getElementById('messageSelect');
  const index = select ? parseInt(select.value) || 0 : 0;
  
  return messages[index] || messages[0];
}

// 渲染客戶列表
function render() {
  const list = document.getElementById('customerList');
  const today = new Date().toISOString().slice(0, 10);
  const sentToday = parseInt(localStorage.getItem('sentToday_' + today)) || 0;
  
  // 更新統計數據
  document.getElementById('total').textContent = allCustomers.length;
  
  const pendingCustomers = allCustomers.filter(c => {
    const phoneKey = c.phone ? c.phone.replace(/[^\d+]/g, '') : '';
    return phoneKey && !localStorage.getItem('sent_' + phoneKey);
  });
  
  document.getElementById('new').textContent = pendingCustomers.length;
  document.getElementById('sent').textContent = sentToday;
  
  // 如果沒有待發送客戶
  if (pendingCustomers.length === 0) {
    list.innerHTML = `
      <div style="text-align:center;padding:50px;color:#888;font-size:16px;">
        <div style="font-size:48px;">🎉</div>
        <div>恭喜！今日全部客戶已發送完畢</div>
        <div style="font-size:14px;margin-top:10px;">請上傳新客戶數據或等待明天</div>
      </div>`;
    return;
  }
  
  // 如果沒有選擇消息類別
  if (!selectedCategory) {
    list.innerHTML = `
      <div style="text-align:center;padding:30px;color:#ff6b6b;">
        <div style="font-size:36px;">⚠️</div>
        <div>請先選擇消息類別</div>
        <div style="font-size:14px;margin-top:10px;">在上方選擇要發送的消息類型</div>
      </div>`;
    return;
  }
  
  // 渲染客戶列表
  list.innerHTML = pendingCustomers.map(customer => {
    const phoneKey = customer.phone.replace(/[^\d+]/g, '');
    const customerCategory = (customer.interest && customer.interest[0]) || selectedCategory;
    const messageObj = getSelectedMessage();
    const messageText = messageObj ? messageObj.text : '請選擇消息';
    
    // 如果有客戶特定類別且存在對應消息，使用客戶類別
    let finalMessage = messageText;
    if (customerCategory !== selectedCategory && allMessages[customerCategory]) {
      finalMessage = allMessages[customerCategory][0].text;
    }
    
    const waLink = `https://wa.me/${phoneKey}?text=${encodeURIComponent(finalMessage)}`;
    
    return `
      <div class="customer">
        <div style="overflow:hidden;margin-bottom:8px;">
          <span class="phone-number">${customer.phone}</span>
          <span class="tag" style="background:${getCategoryColor(customerCategory)}">
            ${customerCategory}
          </span>
        </div>
        <div class="msg" title="${finalMessage.replace(/"/g, '&quot;')}">
          ${finalMessage.substring(0, 100)}${finalMessage.length > 100 ? '...' : ''}
        </div>
        <button class="btn" onclick="sendNow('${waLink}', '${phoneKey}', '${customerCategory}')">
          發送到 WhatsApp
        </button>
      </div>`;
  }).join('');
}

// 獲取類別顏色
function getCategoryColor(category) {
  const colors = {
    general: '#e3f2fd',
    investment: '#f3e5f5',
    insurance: '#e8f5e8',
    electronics: '#fff3e0',
    fashion: '#fce4ec',
    home: '#e0f2f1',
    food: '#fff8e1'
  };
  return colors[category] || '#f5f5f5';
}

// 發送消息
function sendNow(url, phoneKey, category) {
  if (!confirm(`確認要向 ${phoneKey} 發送 ${category} 類消息嗎？`)) {
    return;
  }
  
  // 標記已發送
  localStorage.setItem('sent_' + phoneKey, new Date().toISOString());
  
  // 更新今日計數
  const today = new Date().toISOString().slice(0, 10);
  const todayCount = parseInt(localStorage.getItem('sentToday_' + today)) || 0;
  localStorage.setItem('sentToday_' + today, todayCount + 1);
  
  // 三重跳轉保險
  // 方法1：直接跳轉
  window.location.href = url;
  
  // 方法2：新窗口打開
  setTimeout(() => {
    window.open(url, '_blank', 'noopener,noreferrer');
  }, 300);
  
  // 方法3：創建鏈接點擊
  setTimeout(() => {
    const link = document.createElement('a');
    link.href = url;
    link.target = '_blank';
    link.rel = 'noopener noreferrer';
    link.style.display = 'none';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }, 600);
  
  // 更新界面
  setTimeout(() => {
    render();
    alert(`消息已標記為發送！\n電話：${phoneKey}\n類別：${category}`);
  }, 800);
}

// 清除所有數據
function clearAllData() {
  if (!confirm('確定要清除所有本地數據嗎？這將重置所有發送記錄。')) {
    return;
  }
  
  // 清除所有發送記錄
  const keys = Object.keys(localStorage);
  keys.forEach(key => {
    if (key.startsWith('sent_') || key.startsWith('sentToday_')) {
      localStorage.removeItem(key);
    }
  });
  
  // 重新渲染
  render();
  alert('所有發送記錄已清除！');
}

// 更新狀態顯示
function updateStatus(elementId, message) {
  const element = document.getElementById(elementId);
  if (element) {
    element.textContent = message;
    setTimeout(() => {
      element.textContent = '';
    }, 3000);
  }
}

// 實時時間更新
setInterval(() => {
  const now = new Date();
  const timeStr = now.toLocaleTimeString('zh-TW', {
    hour: '2-digit',
    minute: '2-digit',
    hour12: false
  });
  document.getElementById('time').textContent = timeStr;
}, 1000);

// 加載保存的消息類別選擇
window.addEventListener('load', () => {
  const savedCategory = localStorage.getItem('selectedCategory');
  if (savedCategory) {
    selectedCategory = savedCategory;
  }
});
</script>
</body>
</html>
