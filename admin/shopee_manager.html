<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>Shopee 产品管理器</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: Arial; margin: 20px; background: #f5f5f5; }
    .header { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
    .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { border: 1px solid #ddd; padding: 10px; }
    th { background: #f2f2f2; }
    button { padding: 8px 15px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; }
    .btn-primary { background: #007bff; color: white; }
    .btn-success { background: #28a745; color: white; }
    input, select { padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🛍️ Shopee 产品管理器</h1>
    <div>
      <button onclick="loadData()" class="btn-primary">🔄 刷新</button>
      <button onclick="saveData()" class="btn-success">💾 保存</button>
      <span id="status" style="margin-left: 15px; color: #666;">就绪</span>
    </div>
  </div>

  <div class="card">
    <h2>添加新产品</h2>
    <form id="addForm">
      <input type="text" id="productName" placeholder="产品名称" required style="width: 200px;">
      <input type="number" step="0.01" id="productPrice" placeholder="价格" required style="width: 100px;">
      <input type="number" id="productStock" placeholder="库存" required style="width: 100px;">
      <select id="productCategory">
        <option value="health">保健养生</option>
        <option value="home">家居生活</option>
        <option value="electronic">电子产品</option>
        <option value="book">图书文具</option>
      </select>
      <button type="submit" class="btn-primary">添加</button>
    </form>
  </div>

  <div class="card">
    <h2>产品列表 (<span id="count">0</span>)</h2>
    <input type="text" id="search" placeholder="搜索..." oninput="filterProducts()" style="padding: 8px; width: 300px;">
    <table id="productTable">
      <thead>
        <tr><th>ID</th><th>名称</th><th>价格</th><th>库存</th><th>分类</th><th>操作</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    let products = [];
    
    async function loadData() {
      try {
        const response = await fetch('shopee_products.json');
        products = (await response.json()).products || [];
        updateDisplay();
        showStatus('✅ 加载成功: ' + products.length + ' 个产品');
      } catch (error) {
        showStatus('❌ 加载失败: ' + error.message);
        products = [];
        updateDisplay();
      }
    }
    
    function updateDisplay() {
      document.getElementById('count').textContent = products.length;
      const search = document.getElementById('search').value.toLowerCase();
      const filtered = products.filter(p => p.name.toLowerCase().includes(search));
      
      const tbody = document.querySelector('#productTable tbody');
      tbody.innerHTML = '';
      
      filtered.forEach(p => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${p.id}</td>
          <td>${p.name}</td>
          <td>RM ${p.price}</td>
          <td>${p.stock}</td>
          <td>${getCategory(p.category)}</td>
          <td>
            <button onclick="editProduct(${p.id})">编辑</button>
            <button onclick="deleteProduct(${p.id})" style="background:#dc3545;color:white;">删除</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }
    
    function getCategory(cat) {
      const map = { health: '保健', home: '家居', electronic: '电子', book: '图书' };
      return map[cat] || cat;
    }
    
    document.getElementById('addForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const newId = Math.max(...products.map(p => p.id), 0) + 1;
      const newProduct = {
        id: newId,
        name: document.getElementById('productName').value,
        price: parseFloat(document.getElementById('productPrice').value),
        stock: parseInt(document.getElementById('productStock').value),
        category: document.getElementById('productCategory').value,
        status: 'active',
        sales: 0
      };
      products.push(newProduct);
      updateDisplay();
      this.reset();
      showStatus('✅ 添加成功: ' + newProduct.name);
    });
    
    function editProduct(id) {
      const product = products.find(p => p.id === id);
      if (!product) return;
      const newName = prompt('新名称:', product.name);
      if (newName) product.name = newName;
      const newPrice = prompt('新价格:', product.price);
      if (newPrice) product.price = parseFloat(newPrice);
      updateDisplay();
      showStatus('✅ 更新成功: ID ' + id);
    }
    
    function deleteProduct(id) {
      if (!confirm('确定删除?')) return;
      products = products.filter(p => p.id !== id);
      updateDisplay();
      showStatus('✅ 删除成功: ID ' + id);
    }
    
    async function saveData() {
      const data = {
        products: products,
        totalProducts: products.length,
        lastUpdated: new Date().toISOString()
      };
      // 这里可以添加保存到服务器的代码
      showStatus('💾 数据已更新');
    }
    
    function filterProducts() {
      updateDisplay();
    }
    
    function showStatus(msg) {
      document.getElementById('status').textContent = msg;
    }
    
    // 自动加载
    window.onload = loadData;
  </script>
</body>
</html>
