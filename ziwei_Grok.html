    <style>

<body>

<div class="container">
    <div class="card">

                    </div>
                    <input type="date" id="date-picker" class="picker-date-input" value="1995-01-31">
                    <div class="manual-date-inputs" id="manual-inputs">
                        <input type="number" id="in-year" placeholder="年" min="1900" max="2100" value="1995">
                        <input type="number" id="in-month" placeholder="月" min="1" max="12" value="1">
                        <input type="number" id="in-day" placeholder="日" min="1" max="31" value="31">
                    </div>
                </div>
                <div class="info-panel" id="date-live-info">🌿 請輸入出生日期</div>
            </div>

            <div class="input-field">

                    <option value="0">子時 (23:00-01:00)</option>
                    <option value="1">丑時 (01:00-03:00)</option>
                    <option value="2">寅時 (03:00-05:00)</option>
                    <option value="3">卯時 (05:00-07:00)</option>
                    <option value="4">辰時 (07:00-09:00)</option>
                    <option value="5">巳時 (09:00-11:00)</option>
                    <option value="6">午時 (11:00-13:00)</option>
                    <option value="7">未時 (13:00-15:00)</option>
                    <option value="8">申時 (15:00-17:00)</option>
                    <option value="9">酉時 (17:00-19:00)</option>
                    <option value="10">戌時 (19:00-21:00)</option>
                    <option value="11">亥時 (21:00-23:00)</option>
                </select>
            </div>

            <div class="input-field">
                <label>⚥ 性别</label>
                <select id="gender">
                    <option value="male">乾造 (男)</option>
                    <option value="female">坤造 (女)</option>
                </select>
            </div>
        </div>

        <div class="btn-container">
            <button id="start-btn">🔮 起盤演曜 · 洞悉天機</button>
        </div>
        <div class="footnote">※ 已修正農曆轉換邏輯，支援1900-2100年高精度計算</div>
    </div>

    <div class="loading" id="loading-area" style="display:none; text-align:center; padding:48px 20px;">
        <div class="spinner" style="border:4px solid rgba(255,215,0,0.2); border-top:4px solid #FFD966; border-radius:50%; width:54px; height:54px; animation:spin 1s linear infinite; margin:0 auto 18px;"></div>
        <p style="color:#FFE1A0;">⚙️ 星曜垂象，推演命盤...</p>
    </div>

    <div class="card result-area" id="result-area">
        <h2 id="result-title">🏮 紫微斗數本命盤 🏮</h2>
        <div class="palace-grid" id="palace-grid"></div>
    </div>
</div>

<!-- 你的贊助面板和咖啡按鈕可繼續保留，我這裡省略以節省篇幅，你可以把原本的 support-panel 區塊貼回來 -->

<script>
// ==================== 正宗農曆轉換模組（已修復）====================
const LunarData = (function() {
    const lunarInfo = [
        0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,
        0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,
        0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,
        0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,
        0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,
        0x06ca0,0x0b550,0x15355,0x04da0,0x0a5b0,0x14573,0x052b0,0x0a9a8,0x0e950,0x06aa0,
        0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,
        0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b6a0,0x195a6,
        0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,
        0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06b58,0x055c0,0x0ab60,0x096d5,0x092e0,
        0x0c960,0x0d954,0x0d4a0,0x0da50,0x07552,0x056a0,0x0abb7,0x025d0,0x092d0,0x0cab5,
        0x0a950,0x0b4a0,0x0baa4,0x0ad50,0x055d9,0x04ba0,0x0a5b0,0x15176,0x052b0,0x0a930,
        0x07954,0x06aa0,0x0ad50,0x05b52,0x04b60,0x0a6e6,0x0a4e0,0x0d260,0x0ea65,0x0d530,
        0x05aa0,0x076a3,0x096d0,0x04bd7,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,0x0dd45,
        0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0,
        0x14b63,0x09370,0x049f8,0x04970,0x064b0,0x168a6,0x0ea50,0x06aa0,0x1a6c4,0x0aae0,
        0x092e0,0x0d2e3,0x0c960,0x0d557,0x0d4a0,0x0da50,0x05d55,0x056a0,0x0a6d0,0x055d4,
        0x052d0,0x0a9b8,0x0a950,0x0b4a0,0x0b6a6,0x0ad50,0x055a0,0x0aba4,0x0a5b0,0x052b0,
        0x0b273,0x06930,0x07337,0x06aa0,0x0ad50,0x14b55,0x04b60,0x0a570,0x054e4,0x0d160,
        0x0e968,0x0d520,0x0daa0,0x16aa6,0x056d0,0x04ae0,0x0a9d4,0x0a2d0,0x0d150,0x0f252,
        0x0d520
    ];

    function getLeapMonth(year) {
        return (lunarInfo[year - 1900] & 0xf0000) >> 16;
    }

    function getLunarMonthDays(year, month) {
        return (lunarInfo[year - 1900] & (0x10000 >> month)) ? 30 : 29;
    }

    function getLeapMonthDays(year) {
        const leap = getLeapMonth(year);
        if (leap === 0) return 0;
        return (lunarInfo[year - 1900] & (0x10000 >> leap)) ? 30 : 29;
    }

    function getLunarYearDays(year) {
        let sum = 0;
        for (let i = 1; i <= 12; i++) sum += getLunarMonthDays(year, i);
        return sum + getLeapMonthDays(year);
    }

    function solarToLunar(y, m, d) {
        if (y < 1900 || y > 2100) return { valid: false, error: "年份超出1900-2100" };

        const base = new Date(1900, 0, 31);
        const target = new Date(y, m - 1, d);
        let offset = Math.floor((target.getTime() - base.getTime()) / 86400000);

        if (offset < 0) return { valid: false };

        let lunarYear = 1900;
        while (offset >= getLunarYearDays(lunarYear) && lunarYear < 2100) {
            offset -= getLunarYearDays(lunarYear);
            lunarYear++;
        }

        const leap = getLeapMonth(lunarYear);
        let lunarMonth = 1, lunarDay = 1, isLeap = false;

        for (let i = 1; i <= 12; i++) {
            if (leap > 0 && i === leap) {
                const leapDays = getLeapMonthDays(lunarYear);
                if (offset < leapDays) {
                    isLeap = true;
                    lunarMonth = i;
                    lunarDay = offset + 1;
                    break;
                }
                offset -= leapDays;
            }

            const monthDays = getLunarMonthDays(lunarYear, i);
            if (offset < monthDays) {
                lunarMonth = i;
                lunarDay = offset + 1;
                break;
            }
            offset -= monthDays;
        }

        const tg = ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
        const dz = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
        const gzYear = tg[(lunarYear - 4) % 10] + dz[(lunarYear - 4) % 12];

        const monthNames = ["正月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];
        const realMonthName = (isLeap ? "閏" : "") + monthNames[lunarMonth - 1];

        return {
            valid: true,
            lunarYear,
            lunarMonth,
            lunarDay,
            lunarMonthName: realMonthName,
            isLeap,
            gzYear
        };
    }

    function getGzYear(lunarYear) {
        const tg = ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
        const dz = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
        return tg[(lunarYear - 4) % 10] + dz[(lunarYear - 4) % 12];
    }

    function getWeekName(y, m, d) {
        const date = new Date(y, m-1, d);
        const weeks = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
        return weeks[date.getDay()] || "未知";
    }

    return { solarToLunar, getGzYear, getWeekName };
})();

// ==================== 紫微排盤（可後續再優化）====================
const EARTH_BRANCHES = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
const TWELVE_PALACES = ["命宮","兄弟宮","夫妻宮","子女宮","財帛宮","疾厄宮","遷移宮","交友宮","官祿宮","田宅宮","福德宮","父母宮"];
const MAJOR_STARS = ["紫微","天機","太陽","武曲","天同","廉貞","天府","太陰","貪狼","巨門","天相","天梁","七殺","破軍"];

function generatePalaceData(lunarMonth, lunarDay, timeIdx) {
    // ...（你原本的 generatePalaceData 函數保持不變，我這裡省略以節省空間）
    // 如果你需要我幫你把安星也改得更接近正宗，再告訴我
    let monthFixed = Math.min(Math.max(lunarMonth, 1), 12);
    let dayFixed = Math.min(Math.max(lunarDay, 1), 30);
    let startPos = 2;
    let monthOffset = (monthFixed - 1) % 12;
    let tempPos = (startPos + monthOffset) % 12;
    let mingPalaceIdx = (tempPos - timeIdx + 12) % 12;
    
    let palaceArr = [];
    for (let i = 0; i < 12; i++) {
        let dz = EARTH_BRANCHES[i];
        let nameIdx = (i - mingPalaceIdx + 12) % 12;
        palaceArr.push({ dz, name: TWELVE_PALACES[nameIdx], major: "", minorFinal: "" });
    }

    // 主星簡化分配（目前保留你原本邏輯）
    let seed = (dayFixed * 7 + timeIdx * 3 + monthFixed * 11) % 14;
    let ziweiPos = (mingPalaceIdx + seed) % 12;
    palaceArr[ziweiPos].major = MAJOR_STARS[0];
    palaceArr[(ziweiPos + 6) % 12].major = MAJOR_STARS[6];

    // 其餘星曜分配...（保持你原本的）
    // 為節省篇幅，此處省略完整分配，你可把原本 generatePalaceData 貼回來替換這段

    return palaceArr;
}
