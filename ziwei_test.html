<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>紫微斗数排盘 - 测试版</title>
    <script src="https://unpkg.com/iztro@2.4.7/dist/iztro.umd.js"></script>
</head>
<body>
    <h1>紫微斗数排盘测试</h1>
    <button onclick="test()">点击测试</button>
    <pre id="output"></pre>

    <script>
        function test() {
            const output = document.getElementById('output');
            output.innerHTML = '加载中...';
            
            // 检查 iztro 是否加载
            if (typeof iztro === 'undefined') {
                output.innerHTML = '❌ iztro 未加载，请检查网络';
                return;
            }
            
            output.innerHTML = '✅ iztro 已加载\n';
            
            // 检查是否有 astro 对象
            if (!iztro.astro) {
                output.innerHTML += '❌ iztro.astro 不存在\n';
                output.innerHTML += '可用的方法: ' + Object.keys(iztro);
                return;
            }
            
            output.innerHTML += '✅ iztro.astro 存在\n';
            output.innerHTML += '可用方法: ' + Object.keys(iztro.astro) + '\n\n';
            
            // 尝试排盘
            try {
                // 尝试不同的 API 格式
                let result;
                
                if (typeof iztro.astro.bySolar === 'function') {
                    result = iztro.astro.bySolar(1990, 5, 10, 11, 0);
                    output.innerHTML += '✅ 使用 bySolar 成功\n';
                } else if (typeof iztro.astrolabe === 'function') {
                    result = iztro.astrolabe({ solarDate: [1990, 5, 10], hour: 11, gender: 0 });
                    output.innerHTML += '✅ 使用 astrolabe 成功\n';
                } else {
                    output.innerHTML += '❌ 没有找到排盘方法\n';
                    return;
                }
                
                output.innerHTML += '\n排盘结果:\n' + JSON.stringify(result, null, 2);
                
            } catch(e) {
                output.innerHTML += '❌ 排盘出错: ' + e.message;
            }
        }
    </script>
</body>
</html>
